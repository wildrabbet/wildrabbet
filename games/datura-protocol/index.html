<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Datura Protocol</title>
<meta name="description" content="A procedurally hallucinated organism sim. Shapes touch you, become you, and never stop growing.">
<style>
  :root{ --ui:#e9dcff; --dim:#8f7fb0; }
  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{ width:100%; height:100%; overflow:hidden; background:#05020a; }
  body{
    font-family:'Courier New',ui-monospace,monospace;
    color:var(--ui); cursor:none; touch-action:none;
    -webkit-user-select:none; user-select:none;
  }
  canvas{ position:fixed; inset:0; display:block; }
  #gl{ z-index:1; }
  #veil{ z-index:2; pointer-events:none; }
  /* no crosshair — the mandala's dilating pupil IS the fixation point */

  /* ---------- HUD ---------- */
  #hud{ position:fixed; z-index:5; inset:0; pointer-events:none; }
  .stat{ position:absolute; text-shadow:0 0 14px rgba(180,120,255,.6); }
  #size{ top:16px; left:20px; font-size:12px; letter-spacing:.28em; color:var(--dim); }
  #size b{ display:block; font-size:34px; letter-spacing:.02em; color:#fff; font-weight:400;
           text-shadow:0 0 24px rgba(200,120,255,.9),0 0 60px rgba(120,80,255,.5); }
  #forms{ top:18px; right:20px; text-align:right; font-size:11px; letter-spacing:.24em; color:var(--dim); }
  #forms b{ color:#ffd9f4; font-weight:400; }
  #whisper{ position:absolute; bottom:12%; left:0; right:0; text-align:center;
            font-size:20px; letter-spacing:.6em; color:#fff; opacity:0; font-weight:400;
            text-shadow:0 0 30px rgba(255,120,220,.9); }
  #meterwrap{ position:absolute; left:20px; right:20px; bottom:16px; height:2px;
              background:rgba(255,255,255,.08); overflow:hidden; }
  #meter{ position:absolute; inset:0; width:0%; background:linear-gradient(90deg,#7cf,#c9f,#f9c,#fd8);
          filter:blur(.4px); }
  #hint{ position:absolute; bottom:26px; left:0; right:0; text-align:center; font-size:10px;
         letter-spacing:.35em; color:var(--dim); opacity:.5; }

  /* ---------- Intro ---------- */
  #intro{ position:fixed; z-index:10; inset:0; display:flex; flex-direction:column;
          align-items:center; justify-content:center; text-align:center; gap:24px;
          background:radial-gradient(ellipse at 50% 40%,rgba(40,10,60,.35),rgba(5,2,10,.9) 70%);
          cursor:pointer; transition:opacity .8s; }
  #intro.gone{ opacity:0; pointer-events:none; visibility:hidden; transition:opacity .8s, visibility 0s .85s; }
  #intro h1{ font-size:min(15vw,120px); font-weight:400; letter-spacing:.06em; line-height:.9;
             color:#fff; text-shadow:0 0 40px rgba(200,80,255,.8),0 0 120px rgba(120,40,220,.6);
             animation:breathe 5s ease-in-out infinite; }
  #intro h1 span{ display:block; font-size:.34em; letter-spacing:.5em; color:#c9a8ff; text-shadow:none; margin-top:.4em; }
  #intro p{ max-width:520px; font-size:13px; line-height:2; letter-spacing:.12em; color:var(--dim); padding:0 20px; }
  #intro .warn{ color:#ff8fb8; letter-spacing:.2em; font-size:11px; }
  #begin{ margin-top:8px; font-size:14px; letter-spacing:.5em; color:#fff; padding:14px 34px;
          border:1px solid rgba(200,150,255,.4); border-radius:40px; animation:pulseb 2.2s ease-in-out infinite; }
  #opts{ display:flex; gap:26px; font-size:10px; letter-spacing:.25em; color:var(--dim); }
  #opts label{ cursor:pointer; display:flex; align-items:center; gap:8px; }
  #opts input{ accent-color:#c084fc; }
  @keyframes breathe{ 0%,100%{ transform:scale(1); filter:hue-rotate(0deg); } 50%{ transform:scale(1.04); filter:hue-rotate(40deg); } }
  @keyframes pulseb{ 0%,100%{ box-shadow:0 0 0 0 rgba(200,150,255,.4); } 50%{ box-shadow:0 0 40px 4px rgba(200,150,255,.25); } }
  #flashwarn{ position:fixed; z-index:11; bottom:14px; left:0; right:0; text-align:center;
              font-size:9px; letter-spacing:.3em; color:#6b5a86; }
</style>
</head>
<body>
<canvas id="gl"></canvas>
<canvas id="veil"></canvas>

<div id="intro">
  <h1>DATURA<span>PROTOCOL</span></h1>
  <div id="begin">play</div>
</div>

<script>
"use strict";
/* ============================================================================
   DATURA PROTOCOL
   A single-file procedural organism trip. Everything you see is generated:
   creature genomes, their real silhouettes, and — when they touch you — those
   silhouettes are grafted onto your own body, mutating what you are. You never
   stop growing; the camera falls away from you forever. The whole frame is run
   through a GPU feedback/warp/chroma pipeline so it reads like a datura bloom.
   No libraries. No assets. Deterministic-ish RNG so forms feel authored.
   ========================================================================== */

/* ----------------------------- tiny math ---------------------------------- */
const TAU = Math.PI * 2;
const clamp = (v,a,b)=> v<a?a:v>b?b:v;
const lerp  = (a,b,t)=> a+(b-a)*t;
const smooth= (t)=> t*t*(3-2*t);
let _seed = 0x9e3779b9 ^ 0x1234;
function srand(){ // fast deterministic PRNG (mulberry32)
  _seed |= 0; _seed = (_seed + 0x6D2B79F5) | 0;
  let t = Math.imul(_seed ^ (_seed>>>15), 1 | _seed);
  t = (t + Math.imul(t ^ (t>>>7), 61 | t)) ^ t;
  return ((t ^ (t>>>14)) >>> 0) / 4294967296;
}
const rr  = (a,b)=> a + srand()*(b-a);
const ri  = (a,b)=> (a + Math.floor(srand()*(b-a+1)));
const pick= (arr)=> arr[(srand()*arr.length)|0];
function gauss(m=0,s=1){ // box-muller
  const u=1-srand(), v=srand();
  return m + s*Math.sqrt(-2*Math.log(u))*Math.cos(TAU*v);
}
const GOLD = Math.PI*(3-Math.sqrt(5));

/* number formatting for the ever-inflating mass counter */
const SUF=['','K','M','B','T','Qa','Qi','Sx','Sp','Oc','No','Dc','Ud','Dd'];
function fmt(n){
  if(n<1000) return (n<10? n.toFixed(1) : Math.round(n)).toString();
  let i=0; while(n>=1000 && i<SUF.length-1){ n/=1000; i++; }
  if(i>=SUF.length-1 && n>=1000) return n.toExponential(1).replace('e+','e');
  return (n<10?n.toFixed(2):n<100?n.toFixed(1):Math.round(n))+SUF[i];
}

/* --------------------------- global state --------------------------------- */
const REDUCED = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
const G = {
  W:0,H:0, dpr:1,
  t:0, dt:0, running:false, started:false,
  intensity: REDUCED?0.35:1,       // master psychedelia multiplier (flash/chroma/strobe)
  quality:1,                        // auto-degrades if slow
  // camera lives at the player; player sits at world (0,0). scale shrinks as you grow.
  // small targetScreenR => the player is tiny on screen => the world reads as vast.
  scale:1, targetScreenR: 44,
  // shader drive params (smoothed each frame)
  warp:0.55, chroma:0.45, hue:0, decay:0.86, feedZoom:0, feedRot:0,
  kaleido:0, swirl:0, breath:0, flash:0, invert:0, grain:0.05, vignette:0.9,
  spiral:0.5, sat:1.3, pace:0.4, _hueAcc:0, realmHue:0,
  // THE GAME: grow -> evolve (stages) -> transcend (rebirth) -> deeper cycle, forever.
  trip:0, tripTime:0, open:0, phase:'fixate', fixate:1.5,
  cycle:1, depth:0, stage:0, evoProg:0, transReady:false, transCharge:0, drainCD:0,
  shiftHeld:false, shift:0, asc:0, travel:0, realm:0, biome:null,
  nextBiome:null, goldStreak:0, dof:0, dprScale:1,
  eyeTimer:7, eyeDilate:0, phos:0,
  lift:0, liftTimer:70, liftFired:true, garden:[], gardenTimer:35,
  still:0, med:0, rite:'idle', riteT:0, riteTimer:210,
  form:0, pareiTimer:28, parei:0, pareiDur:2, pareiSeed:0,
  rm:{hueRot:0,sat:0,warp:0,chroma:0,kal:0,spiral:0,flowZ:0,flowR:0,spin:0,spd:0,grain:0,vig:0},
  // event impulses (decay over time)
  kick:0, hueSpike:0, warpSpike:0, chromaSpike:0, flashSpike:0, surge:0,
  surgeTimer:16, faceTimer:4, bigFaceTimer:5, burnTimer:4, shadeTimer:8, crawlTimer:12, sound:true,
};

/* =====================================================================
   WEBGL POST PIPELINE  (feedback tunnel + domain warp + chroma + hue)
   Falls back gracefully to a plain 2D blit if WebGL is unavailable.
   ===================================================================== */
const Post = (()=>{
  const glc = document.getElementById('gl');
  let gl = glc.getContext('webgl',{alpha:false,antialias:false,preserveDrawingBuffer:false})
        || glc.getContext('experimental-webgl');
  const ok = !!gl;
  let progPost, progPresent, quad, sceneTex, fbo=[null,null], fboTex=[null,null], cur=0;
  let ctx2d=null; // fallback

  const VERT = `attribute vec2 p; varying vec2 vUv;
    void main(){ vUv = p*0.5+0.5; gl_Position=vec4(p,0.0,1.0);} `;

  const POST = `precision highp float; varying vec2 vUv;
    uniform sampler2D uScene, uPrev; uniform vec2 uRes; uniform float uTime;
    uniform float uWarp,uChroma,uHue,uDecay,uFeedZoom,uFeedRot,uKaleido,uBreath,uSwirl,uSpiral,uHyper,uSat,uPhos,uForm;
    mat2 rot(float a){ float s=sin(a),c=cos(a); return mat2(c,-s,s,c);}
    vec3 hueRot(vec3 col,float a){ const vec3 k=vec3(0.57735); float c=cos(a),s=sin(a);
      return col*c + cross(k,col)*s + k*dot(k,col)*(1.0-c);}
    vec2 warp(vec2 uv,float t,float amp){ vec2 p=uv;
      p.x+=sin(uv.y*7.0+t*0.7)*0.5*amp; p.y+=cos(uv.x*8.0-t*0.6)*0.5*amp;
      p.x+=sin(uv.y*15.0-t*1.3)*0.25*amp; p.y+=cos(uv.x*17.0+t*1.1)*0.25*amp; return p;}
    void main(){
      float aspect=uRes.x/uRes.y;
      vec2 c=(vUv-0.5); c.x*=aspect;
      float r=length(c), ang=atan(c.y,c.x);
      // PERIPHERAL DESIGN: a calm disc at the very centre stays easy to fixate on, while the
      // illusions ramp up the further out you look. cm ~ 0 at the centre, ~1 in the periphery.
      float cm = smoothstep(0.045, 0.42, r);
      ang += uSwirl*(0.6-r)*cm;
      if(uKaleido>0.001){ float seg=1.04719755; float ka=mod(ang,seg); ka=abs(ka-seg*0.5);
        ang=mix(ang,ka+3.14159,uKaleido*cm);}
      vec2 sc=vec2(cos(ang),sin(ang))*r; sc.x/=aspect; vec2 uv2=sc+0.5;
      float amp=uWarp*(0.4+0.6*uBreath)*cm;
      vec2 wuv=warp(uv2,uTime,amp*0.06);
      vec2 dir=normalize(c+1e-5); float ca=uChroma*(0.003+0.03*r);   // aberration grows outward
      float R=texture2D(uScene,wuv+dir*ca).r;
      float Gc=texture2D(uScene,wuv).g;
      float B=texture2D(uScene,wuv-dir*ca).b;
      vec3 scene=vec3(R,Gc,B);
      // FEEDBACK TUNNEL: a steady inward zoom + steady one-way rotation (driven from JS with
      // no oscillation) makes an endless spiral you fall down — it never reverses or stops.
      vec2 fc=(vUv-0.5); fc.x*=aspect; fc*=(1.0+uFeedZoom); fc=rot(uFeedRot)*fc; fc.x/=aspect;
      vec3 fb=texture2D(uPrev,fc+0.5).rgb*uDecay;
      fb=hueRot(fb,0.05);
      vec3 col=1.0-(1.0-scene)*(1.0-fb);   // screen-blend glow trails spiral into the tunnel
      col=hueRot(col,uHue);
      float l=dot(col,vec3(0.299,0.587,0.114));
      col=mix(vec3(l),col,uSat);
      // endless logarithmic spiral arms locked to the tunnel — one direction, forever
      float arms = sin(ang*5.0 + log(r+0.04)*8.0 - uTime*(0.6+uHyper*2.2));
      col += arms * (0.022 + 0.05*uHyper) * (0.5+uSpiral) * cm;
      // entoptic phosphenes: slow breathing concentric rings + a faint lattice shimmer,
      // radiating from the fixation point — the classic closed-eye hallucination
      float ph1 = sin(r*34.0 - uTime*1.7) * (0.6+0.4*sin(ang*3.0 + uTime*0.31));
      float ph2 = sin(r*11.0 - uTime*0.55 + sin(ang*6.0)*0.8);
      col += (ph1*0.7 + ph2*0.45) * uPhos * cm;
      // Kluever form-constant: a slowly rotating honeycomb interference lattice, breathing
      // with the trip — the geometric substrate every deep psychedelic report describes
      float fa=uTime*0.02; mat2 fr=rot(fa);
      vec2 hc=fr*c*(30.0+8.0*sin(uTime*0.05));
      float hex = cos(hc.x) + cos(hc.x*0.5+hc.y*0.866) + cos(hc.x*0.5-hc.y*0.866);
      col += hex*0.333 * uForm * cm;
      // iridescence: oil-slick hue twist that slides down the well
      col = hueRot(col, sin(r*9.0 - uTime*0.4) * uForm * 6.0 * cm);
      gl_FragColor=vec4(clamp(col,0.0,1.0),1.0);
    }`;

  const PRESENT = `precision highp float; varying vec2 vUv;
    uniform sampler2D uTex; uniform vec2 uRes; uniform float uTime,uFlash,uGrain,uVig,uInvert,uHyper,uDof;
    float hash(vec2 p){ return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}
    void main(){ vec2 uv=vUv; vec3 col=texture2D(uTex,uv).rgb;
      if(uDof>0.001){
        // DEPTH OF FIELD down the well: the bottom (centre) is pin-sharp, the walls smear
        // tangentially the further out they are — you are looking DOWN a spiral, and it pulls.
        vec2 c2=uv-0.5; vec2 tand=vec2(-c2.y,c2.x);
        float amt=uDof*dot(c2,c2)*2.2;
        vec3 acc=col;
        acc+=texture2D(uTex,uv+tand*amt).rgb;      acc+=texture2D(uTex,uv-tand*amt).rgb;
        acc+=texture2D(uTex,uv+tand*amt*2.0).rgb;  acc+=texture2D(uTex,uv-tand*amt*2.0).rgb;
        acc+=texture2D(uTex,uv+c2*amt*0.7).rgb;    acc+=texture2D(uTex,uv-c2*amt*0.7).rgb;
        col=acc/7.0;
      }
      if(uHyper>0.001){            // hyperspace: radial motion blur streaking toward centre
        vec2 dir=uv-0.5; vec3 acc=col;
        for(int i=1;i<=8;i++){ float s=float(i)/8.0*uHyper*0.16; acc+=texture2D(uTex,uv-dir*s).rgb; }
        col=acc/9.0;
      }
      col=mix(col,1.0-col,uInvert);
      col+=uFlash;
      vec2 c=uv-0.5; float v=1.0-dot(c,c)*uVig; col*=clamp(v,0.0,1.0);
      float g=hash(uv*uRes+uTime); col+=(g-0.5)*uGrain;
      gl_FragColor=vec4(col,1.0);} `;

  function sh(type,src){ const s=gl.createShader(type); gl.shaderSource(s,src); gl.compileShader(s);
    if(!gl.getShaderParameter(s,gl.COMPILE_STATUS)){ console.warn(gl.getShaderInfoLog(s)); return null;} return s; }
  function prog(vs,fs){ const p=gl.createProgram();
    gl.attachShader(p,sh(gl.VERTEX_SHADER,vs)); gl.attachShader(p,sh(gl.FRAGMENT_SHADER,fs));
    gl.bindAttribLocation(p,0,'p'); gl.linkProgram(p);
    if(!gl.getProgramParameter(p,gl.LINK_STATUS)){ console.warn(gl.getProgramInfoLog(p)); return null;} return p; }
  function mkTex(w,h){ const t=gl.createTexture(); gl.bindTexture(gl.TEXTURE_2D,t);
    gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE);
    gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);
    gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR);
    gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.LINEAR);
    gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,w,h,0,gl.RGBA,gl.UNSIGNED_BYTE,null); return t; }

  function initGL(){
    progPost=prog(VERT,POST); progPresent=prog(VERT,PRESENT);
    if(!progPost||!progPresent){ return false; }
    quad=gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER,quad);
    gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1, 3,-1, -1,3]),gl.STATIC_DRAW);
    sceneTex=gl.createTexture(); gl.bindTexture(gl.TEXTURE_2D,sceneTex);
    gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE);
    gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);
    gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR);
    gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.LINEAR);
    gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL,true);
    return true;
  }

  let W=0,H=0;
  function resize(w,h){
    W=w;H=h; glc.width=w; glc.height=h;
    if(!ok){ return; }
    for(let i=0;i<2;i++){
      if(fbo[i]) gl.deleteFramebuffer(fbo[i]);
      if(fboTex[i]) gl.deleteTexture(fboTex[i]);
      fboTex[i]=mkTex(w,h); fbo[i]=gl.createFramebuffer();
      gl.bindFramebuffer(gl.FRAMEBUFFER,fbo[i]);
      gl.framebufferTexture2D(gl.FRAMEBUFFER,gl.COLOR_ATTACHMENT0,gl.TEXTURE_2D,fboTex[i],0);
      gl.clear(gl.COLOR_BUFFER_BIT);
    }
    gl.bindFramebuffer(gl.FRAMEBUFFER,null);
  }

  function bindQuad(p){ gl.useProgram(p); gl.bindBuffer(gl.ARRAY_BUFFER,quad);
    gl.enableVertexAttribArray(0); gl.vertexAttribPointer(0,2,gl.FLOAT,false,0,0); }
  const U=(p,n)=>gl.getUniformLocation(p,n);

  function frame(sceneCanvas,u){
    if(!ok){ // 2D fallback: just blit the scene with a CSS filter for a little life
      if(!ctx2d) ctx2d=glc.getContext('2d');
      ctx2d.globalCompositeOperation='source-over';
      ctx2d.drawImage(sceneCanvas,0,0);
      glc.style.filter=`saturate(1.5) contrast(1.05) hue-rotate(${(u.hue*57.3)|0}deg)`;
      return;
    }
    const prev=cur, next=cur^1;
    // upload scene
    gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D,sceneTex);
    gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,gl.RGBA,gl.UNSIGNED_BYTE,sceneCanvas);
    // pass 1 -> fbo[next]
    gl.bindFramebuffer(gl.FRAMEBUFFER,fbo[next]); gl.viewport(0,0,W,H);
    bindQuad(progPost);
    gl.uniform1i(U(progPost,'uScene'),0);
    gl.activeTexture(gl.TEXTURE1); gl.bindTexture(gl.TEXTURE_2D,fboTex[prev]);
    gl.uniform1i(U(progPost,'uPrev'),1);
    gl.uniform2f(U(progPost,'uRes'),W,H);
    gl.uniform1f(U(progPost,'uTime'),u.t);
    gl.uniform1f(U(progPost,'uWarp'),u.warp);
    gl.uniform1f(U(progPost,'uChroma'),u.chroma);
    gl.uniform1f(U(progPost,'uHue'),u.hue);
    gl.uniform1f(U(progPost,'uDecay'),u.decay);
    gl.uniform1f(U(progPost,'uFeedZoom'),u.feedZoom);
    gl.uniform1f(U(progPost,'uFeedRot'),u.feedRot);
    gl.uniform1f(U(progPost,'uKaleido'),u.kaleido);
    gl.uniform1f(U(progPost,'uBreath'),u.breath);
    gl.uniform1f(U(progPost,'uSwirl'),u.swirl);
    gl.uniform1f(U(progPost,'uSpiral'),u.spiral);
    gl.uniform1f(U(progPost,'uHyper'),u.hyper);
    gl.uniform1f(U(progPost,'uSat'),u.sat);
    gl.uniform1f(U(progPost,'uPhos'),u.phos);
    gl.uniform1f(U(progPost,'uForm'),u.form);
    gl.drawArrays(gl.TRIANGLES,0,3);
    // pass 2 -> screen (present)
    gl.bindFramebuffer(gl.FRAMEBUFFER,null); gl.viewport(0,0,W,H);
    bindQuad(progPresent);
    gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D,fboTex[next]);
    gl.uniform1i(U(progPresent,'uTex'),0);
    gl.uniform2f(U(progPresent,'uRes'),W,H);
    gl.uniform1f(U(progPresent,'uTime'),u.t);
    gl.uniform1f(U(progPresent,'uFlash'),u.flash);
    gl.uniform1f(U(progPresent,'uGrain'),u.grain);
    gl.uniform1f(U(progPresent,'uVig'),u.vignette);
    gl.uniform1f(U(progPresent,'uInvert'),u.invert);
    gl.uniform1f(U(progPresent,'uHyper'),u.hyper);
    gl.uniform1f(U(progPresent,'uDof'),u.dof);
    gl.drawArrays(gl.TRIANGLES,0,3);
    cur=next;
  }

  let good = ok && initGL();
  return { ok:good, resize, frame, get is2d(){return !good;} };
})();

/* the scene is drawn to an offscreen 2D canvas, then fed to Post */
const scene = document.createElement('canvas');
const sctx  = scene.getContext('2d');
const glCanvas = document.getElementById('gl');
const noteQ = [];   // sounded notes waiting to become light (chromesthesia)

/* =====================================================================
   PROCEDURAL FORM GENERATION
   A "part" is one organ with a real silhouette. Bodies (you + creatures)
   are bags of parts that orbit, spin, pulse and breathe. Absorbing a
   creature grafts its parts onto you.
   ===================================================================== */
const KINDS = ['blob','crystal','star','ring','eye','tentacle','spore','helix','worm','lattice','flower','orbcluster'];
const EXOTIC = ['helix','worm','lattice','flower','orbcluster','tentacle','eye']; // themed-creature signatures

function silhouette(n, spikiness, wobble){
  // radial signature: layered harmonics -> organic-but-authored outlines
  const h1=ri(2,5), h2=ri(5,11), p1=rr(0,TAU), p2=rr(0,TAU);
  const pts=[];
  for(let i=0;i<n;i++){
    const a=i/n*TAU;
    let r=1 + spikiness*Math.sin(a*h1+p1) + wobble*Math.sin(a*h2+p2);
    r=Math.max(0.25,r);
    pts.push(r);
  }
  return pts;
}

function makePart(genome, deep){
  // themed creatures are dominated by one exotic signature (a DNA strand, a worm, a bloom…)
  const kind = genome.theme && srand()<0.7 ? genome.theme
             : deep ? pick(KINDS) : (srand()<0.4?'blob':pick(KINDS));
  const hue  = (genome.hue + gauss(0,genome.spread)) % 360;
  const p = {
    kind, hue:(hue+360)%360,
    sat: clamp(genome.sat+gauss(0,10),40,100),
    light: clamp(genome.light+gauss(0,12),42,80),
    alpha: rr(0.7,1),
    size: rr(0.18,0.5),                     // fraction of body radius
    orbitR: rr(0,1.0),                      // distance of part from core
    orbitA: srand()*TAU,
    orbitSpeed: gauss(0,0.5)*genome.anim,
    rot: srand()*TAU,
    spin: gauss(0,0.7)*genome.anim,
    pulseA: rr(0.04,0.22), pulseP:srand()*TAU, pulseS: rr(0.6,2.4)*genome.anim,
    glow: rr(0.5,1),
  };
  if(kind==='blob')    p.sil=silhouette(ri(9,16), rr(0.12,0.4), rr(0.05,0.25));
  else if(kind==='crystal') p.sil=silhouette(ri(3,7), rr(0.2,0.7), rr(0,0.1));
  else if(kind==='star'){ p.petals=ri(4,9); p.inner=rr(0.35,0.62); }
  else if(kind==='ring'){ p.inner=rr(0.45,0.72); }
  else if(kind==='eye'){ p.size=rr(0.16,0.34); p.lash=srand()<0.5; }
  else if(kind==='tentacle'){ p.segs=ri(5,9); p.len=rr(1.1,2.4); p.wave=rr(1.5,3.5);
    p.width=rr(0.1,0.24); p.orbitR=rr(0.6,1.05); }
  else if(kind==='spore'){ p.dots=ri(5,12); p.spread=rr(0.4,1); }
  else if(kind==='helix'){ p.rungs=ri(6,12); p.len=rr(1.4,2.8); p.amp=rr(0.28,0.5);
    p.freq=rr(2.2,3.8); p.hue2=(hue+rr(120,240))%360; p.width=rr(0.06,0.12); p.orbitR=rr(0.55,1.05); }
  else if(kind==='worm'){ p.segs=ri(6,12); p.len=rr(1.2,2.6); p.wave=rr(1,2.6); p.orbitR=rr(0.5,1.05); }
  else if(kind==='lattice'){ p.grid=ri(3,5); p.jit=rr(0.05,0.2); }
  else if(kind==='flower'){ p.petals=ri(5,11); p.layers=ri(2,3); p.hue2=(hue+rr(20,90))%360; }
  else if(kind==='orbcluster'){ p.orbs=ri(4,9); p.spread=rr(0.5,1.05); }
  return p;
}

function makeGenome(){
  const palettes=[ // curated hallucinogenic hue anchors
    [300,42,60],[190,70,58],[45,90,60],[330,80,62],[265,60,58],
    [150,65,55],[15,88,60],[210,75,60],[95,60,55],[350,70,60],
  ];
  const base=pick(palettes);
  return {
    hue: base[0]+gauss(0,20),
    spread: rr(14,70),
    sat: base[1]+gauss(0,8),
    light: base[2]+gauss(0,6),
    anim: rr(0.6,1.8),
    symmetry: pick([1,1,2,2,3,4,5,6]),
    theme: srand()<0.4 ? pick(EXOTIC) : null,   // ~40% are a distinct species (DNA strand, worm, bloom…)
  };
}

function buildBody(genome, nParts, deep){
  const parts=[];
  const sym=genome.symmetry;
  const base=Math.max(1,Math.ceil(nParts/sym));
  for(let i=0;i<base;i++){
    const seed=makePart(genome, deep);
    for(let s=0;s<sym;s++){
      const clone=Object.assign({},seed);
      clone.orbitA = seed.orbitA + s*(TAU/sym);
      clone.sil = seed.sil;  // share silhouette across a symmetric set
      if(s>0){ clone.hue=(seed.hue+ s*rr(4,16))%360; clone.pulseP=seed.pulseP+s*0.4; }
      parts.push(clone);
    }
  }
  return parts;
}

/* ------------------------------- creatures -------------------------------- */
const beings=[];
function spawnBeing(){
  const g=makeGenome();
  // relative mass: mostly-smaller, sometimes far bigger -> no size drop-off ever.
  // The biome sets predator pressure (mean of the distribution).
  let ratio=Math.exp(gauss(G.biome?G.biome.predBias:-0.35,0.95));
  ratio=clamp(ratio,0.05,4.2);
  const isLeviathan = ratio>2.4;
  const mass=player.mass*ratio;
  const nParts=clamp(Math.round(4+ratio*5+ri(0,4)),3,20);
  const body=buildBody(g,nParts,ratio>1);
  // spawn just outside the visible radius, in view-relative coords (player at 0,0)
  const viewR=Math.hypot(G.W,G.H)/2/G.scale;
  const a=srand()*TAU, d=viewR*rr(1.05,1.5);
  const behavior = isLeviathan ? 'drift' : pick(['seek','seek','wander','orbit','seek','flee']);
  const spd = player.radius * (isLeviathan? rr(0.4,0.9) : rr(1.3,3.6)) * (behavior==='flee'?1.4:1) * (G.biome?G.biome.spd:1);
  const va=srand()*TAU;
  beings.push({
    x:Math.cos(a)*d, y:Math.sin(a)*d,
    vx:Math.cos(va)*spd, vy:Math.sin(va)*spd, spd,
    mass, radius: player.R0*Math.sqrt(mass/player.mass0),
    genome:g, parts:body, spin:gauss(0,0.5), spinV:gauss(0,0.4),
    behavior, wa:srand()*TAU, born:G.t, leviathan:isLeviathan,
    hueDrift: gauss(0,0.3),
  });
}

/* --------------------------------- player --------------------------------- */
const player = {
  x:0,y:0, vx:0,vy:0,
  mass0:1, mass:1, R0:60, radius:60,
  genome:null, parts:[], spin:0,
  hue:280, absorbed:0,
  targetX:0, targetY:0, _pmx:0, _pmy:0,
};
function initPlayer(){
  player.genome=makeGenome();
  player.parts=buildBody(player.genome, 6, false);
  player.hue=player.genome.hue;
}

function graft(b){
  // absorb creature b: add mass, graft some of its real parts onto us, mutate hue
  const before=player.mass;
  player.mass += b.mass;
  player.absorbed++;
  // how much of it literally becomes us
  const take=clamp(Math.round(1+ b.mass/before*3), 1, 8);
  const src=b.parts;
  for(let i=0;i<take && src.length;i++){
    // full-clone a real organ from the creature so it keeps its kind AND every
    // kind-specific field (segs/petals/inner/sil...) — its true shape becomes ours
    const chosen=src[(srand()*src.length)|0];
    const p=Object.assign({},chosen);
    Object.assign(p,{ orbitA:player.parts.length*GOLD + srand()*0.3,
      orbitR:rr(0.55,1.12), orbitSpeed:gauss(0,0.4)*player.genome.anim,
      size:clamp(chosen.size*rr(0.7,1.1),0.12,0.5),
      pulseP:srand()*TAU });
    player.parts.push(p);
  }
  // mutate the whole organism's hue toward what we ate (procedural transformation)
  let dh=((b.genome.hue-player.hue+540)%360)-180;
  player.hue=(player.hue + dh*clamp(b.mass/player.mass,0.03,0.5) + 360)%360;
  // bound part count: fold the smallest/oldest into the core, keep the mass
  if(player.parts.length>120){
    player.parts.sort((a,c)=> (a.orbitR+ a.size) - (c.orbitR+c.size));
    player.parts.splice(0, player.parts.length-120);
  }
  // impulses
  const punch=clamp(b.mass/before,0.15,1.6);
  G.hueSpike   = Math.min(1.4, G.hueSpike + punch*0.8);
  G.warpSpike  = Math.min(1.6, G.warpSpike + punch);
  G.chromaSpike= Math.min(1.8, G.chromaSpike + punch*1.2);
  G.flashSpike = Math.min(0.9, G.flashSpike + punch*0.5*G.intensity);
  G.kick       = Math.min(1.5, G.kick + punch);
  burst(b.x,b.y, b.radius, b.genome.hue, 14+punch*22);
  parts.push({x:0,y:0,life:1,decay:rr(0.7,1.1),r0:player.radius*0.6,hue:b.genome.hue,kind:'ring'}); // absorb shock-ring
  audio.absorb(b.mass/before);
  // metamorphosis thresholds: 3, 9, 27, 81, 243 — then the mandala blooms
  while(!G.transReady && player.mass>=stageThreshold(G.stage)){
    if(G.stage>=4){ G.transReady=true; audio.ready(); break; }
    evolve();
  }
}

/* =====================================================================
   THE GAME LOOP: evolve -> transcend -> rebirth, forever deeper
   ===================================================================== */
function stageThreshold(s){ return Math.pow(3, s+1); }   // 3, 9, 27, 81, 243

/* ---------- BIOMES (roguelike): every metamorphosis carries you into a new,
   procedurally-rolled biome — a visual realm PLUS its own game settings
   (population, predator pressure, speed) and its own illusion mix. Five biomes
   per incarnation, a fresh roll every time, deeper jitter every cycle: the run
   never repeats. ---------- */
function makeBiome(depth){
  const idx=ri(1,REALMS.length-1);                 // visual archetype (palette/flow/spin)
  const j=(v,s)=>v*(1+gauss(0,s));
  return {
    idx,
    // gameplay
    spawnTarget: Math.round(clamp(j(24,0.22)+depth*1.2, 14, 46)),      // barren <-> teeming
    predBias: clamp(-0.38 + gauss(0,0.14) + depth*0.015, -0.75, 0.1),  // predator pressure
    spd: clamp(j(1,0.25)*(1+depth*0.03), 0.6, 2.2),                    // tempo of the fauna
    // illusion mix — which hallucinations this biome favours
    ill:{ face:j(1,0.45), burn:j(1,0.45), shade:j(1,0.55), crawl:j(1,0.55),
          big:j(1,0.45), eye:j(1,0.5) },
  };
}
function clearLightBiome(){
  // the true ending(?) — a near-empty white stillness. Then the wheel keeps turning.
  return { idx:7, clear:true, spawnTarget:6, predBias:-2.5, spd:0.5,
    ill:{face:0.2,burn:0.3,shade:0.1,crawl:0,big:0.4,eye:1.6} };
}
function enterBiome(){
  if(G.goldStreak>=7){ G.biome=clearLightBiome(); G.goldStreak=0; }
  else if(G.nextBiome){ G.biome=G.nextBiome; G.nextBiome=null; }
  else G.biome=makeBiome(G.depth);
  G.realm=G.biome.idx;
  G.travel=1;                                       // the crossing whoosh
  gates.length=0;
  buildSnakes();                                    // this biome's snake-wheels
  audio.setBiome(G.biome.idx, !!G.biome.clear);
  audio.surge();
}

/* ---------- REALITY GATES: as a metamorphosis ripens, two futures surface in the
   periphery — soft vortices, each previewing the biome it leads to (its palette, its
   spiral's character: thin & fast, wide & slow...). You never look at them; you read
   them peripherally and STEER into the one you choose. Sometimes one is ringed in
   gold — the set path. Follow gold seven times in a row and you reach the clear
   light. The paths always regenerate; the wheel has no end. ---------- */
const gates=[];
function spawnGates(){
  const a0=srand()*TAU, viewR=Math.hypot(G.W,G.H)/2/G.scale;
  const goldSide=srand()<0.55 ? ri(0,1) : -1;
  for(let s=0;s<2;s++){
    const bio=makeBiome(G.depth);
    const ang=a0+s*Math.PI+gauss(0,0.45);
    gates.push({ x:Math.cos(ang)*viewR*1.15, y:Math.sin(ang)*viewR*1.15,
      r: player.radius*rr(2.6,4.2), bio, gold:s===goldSide,
      hue:(bio.idx*47+130)%360, ph:srand()*TAU });
  }
}
function drawGates(){
  if(!gates.length) return;
  for(const g2 of gates){
    const sx=g2.x*G.scale+G.W/2, sy=g2.y*G.scale+G.H/2, R=Math.max(24,g2.r*G.scale);
    if(sx<-R*2||sx>G.W+R*2||sy<-R*2||sy>G.H+R*2) continue;
    sctx.globalCompositeOperation='lighter';
    const gr=sctx.createRadialGradient(sx,sy,0,sx,sy,R*1.4);
    gr.addColorStop(0,hsl(g2.hue,80,55,0.28)); gr.addColorStop(0.7,hsl(g2.hue,85,45,0.1)); gr.addColorStop(1,hsl(g2.hue,80,40,0));
    sctx.globalAlpha=1; sctx.fillStyle=gr; sctx.beginPath(); sctx.arc(sx,sy,R*1.4,0,TAU); sctx.fill();
    // the spiral motif previews that future's character (arm count/tightness from its biome)
    sctx.globalAlpha=0.5; sctx.strokeStyle=hsl(g2.hue,90,70,1); sctx.lineWidth=Math.max(1,R*0.03);
    sctx.beginPath();
    const tight=0.25+(g2.bio.idx%4)*0.14;
    for(let a2=0;a2<TAU*2.4;a2+=0.1){
      const rr2=R*0.08+(a2/(TAU*2.4))*R*0.85, aa=a2/tight*0.35+G.t*(0.4+g2.bio.spd*0.3)+g2.ph;
      const px=sx+Math.cos(aa)*rr2, py=sy+Math.sin(aa)*rr2;
      a2? sctx.lineTo(px,py):sctx.moveTo(px,py);
    }
    sctx.stroke();
    if(g2.gold){ sctx.globalAlpha=0.45+0.3*Math.sin(G.t*2.5);
      sctx.strokeStyle='hsla(46,100%,72%,1)'; sctx.lineWidth=Math.max(1.5,R*0.05);
      sctx.beginPath(); sctx.arc(sx,sy,R,0,TAU); sctx.stroke(); }
  }
  sctx.globalAlpha=1; sctx.globalCompositeOperation='source-over';
}

/* ---------- EYE EXPANSIONS: a vast iris blooms out of the fixation point and
   dilates past you — fibers, ring and pupil-edge — while the mandala's own
   pupil dilates in sympathy. ---------- */
const eyeWaves=[];
function spawnEyeWave(){
  if(eyeWaves.length>=2) return;
  eyeWaves.push({ t0:G.t, dur:rr(2.4,4), hue:pick([26,36,116,205,212,275]),
    sat:rr(30,62), fib:ri(28,46), ph:srand()*TAU });
  G.eyeDilate=1;
}
function drawEyeWaves(){
  if(!eyeWaves.length) return;
  const w=G.W,h=G.H,cx=w/2,cy=h/2, maxR=Math.hypot(w,h)*0.62;
  sctx.save(); sctx.globalCompositeOperation='lighter'; sctx.lineCap='round';
  for(let i=eyeWaves.length-1;i>=0;i--){
    const e=eyeWaves[i]; const u=(G.t-e.t0)/e.dur;
    if(u>=1){ eyeWaves.splice(i,1); continue; }
    const R=Math.pow(u,0.62)*maxR + 30;
    const fade=Math.sin(Math.PI*Math.min(1,u*1.15));
    const bw=R*0.22;                                  // iris band width
    // iris band
    sctx.globalAlpha=0.16*fade;
    sctx.strokeStyle=hsl(e.hue,e.sat,52,1); sctx.lineWidth=bw;
    sctx.beginPath(); sctx.arc(cx,cy,R,0,TAU); sctx.stroke();
    // iris fibers — radial striations across the band
    sctx.globalAlpha=0.2*fade; sctx.lineWidth=Math.max(1,R*0.012);
    for(let k=0;k<e.fib;k++){
      const a=e.ph + k/e.fib*TAU + u*0.6;
      const r0=R-bw*0.48, r1=R+bw*0.48*rr(0.7,1);
      sctx.strokeStyle=hsl((e.hue+((k*13)%3)*14)%360, e.sat, 44+((k*7)%3)*14, 1);
      sctx.beginPath();
      sctx.moveTo(cx+Math.cos(a)*r0, cy+Math.sin(a)*r0);
      sctx.lineTo(cx+Math.cos(a)*r1, cy+Math.sin(a)*r1);
      sctx.stroke();
    }
    // pupil edge — the dark inner rim that makes it read as an EYE
    sctx.globalCompositeOperation='source-over';
    sctx.globalAlpha=0.3*fade;
    sctx.strokeStyle='rgba(3,1,6,0.95)'; sctx.lineWidth=bw*0.35;
    sctx.beginPath(); sctx.arc(cx,cy,R-bw*0.62,0,TAU); sctx.stroke();
    sctx.globalCompositeOperation='lighter';
    // limbal ring — bright outer edge
    sctx.globalAlpha=0.22*fade;
    sctx.strokeStyle=hsl(e.hue,e.sat+20,70,1); sctx.lineWidth=Math.max(1,bw*0.12);
    sctx.beginPath(); sctx.arc(cx,cy,R+bw*0.55,0,TAU); sctx.stroke();
  }
  sctx.restore(); sctx.globalAlpha=1; sctx.globalCompositeOperation='source-over';
}

function evolve(){
  // a metamorphosis: symmetry deepens, a new organ system blooms across the body
  G.stage++;
  const g=player.genome;
  g.symmetry=clamp((g.symmetry||1)+1,1,8);
  if(srand()<0.5) g.theme=pick(EXOTIC);
  player.parts.push(...buildBody(g, 4+G.stage*2, true));
  if(player.parts.length>140){
    player.parts.sort((a,c)=>(a.orbitR+a.size)-(c.orbitR+c.size));
    player.parts.splice(0, player.parts.length-140);
  }
  G.kick=Math.min(1.5,G.kick+1); G.warpSpike+=0.8; G.chromaSpike+=0.9; G.hueSpike+=0.7;
  G.flashSpike=Math.min(0.9,G.flashSpike+0.35*G.intensity);
  burst(0,0,player.radius*1.2,player.hue,40);
  parts.push({x:0,y:0,life:1,decay:0.8,r0:player.radius*0.8,hue:player.hue,kind:'ring'});
  enterBiome();          // every metamorphosis crosses into a new biome
  spawnEyeWave();        // the world opens an eye as you change
  audio.evolve();
}

function rebirth(){
  // transcendence completes: a new incarnation, a new realm, deeper in — forever
  G.cycle++; G.depth=Math.min(12,G.depth+1);
  G.stage=0; G.transReady=false; G.transCharge=0; G.evoProg=0;
  enterBiome();
  // carry echoes of what you were into the next life
  const echoes=[];
  for(let i=0;i<Math.min(2,player.parts.length);i++){
    const e=player.parts[(srand()*player.parts.length)|0];
    echoes.push(Object.assign({},e,{orbitA:srand()*TAU,orbitR:rr(0.5,1)}));
  }
  player.genome=makeGenome(); player.hue=player.genome.hue;
  player.mass=1; player.vx=player.vy=0;
  player.parts=buildBody(player.genome,6,false).concat(echoes);
  beings.length=0;
  for(let i=0;i<26;i++) spawnBeing();
  G.flashSpike=Math.min(1,0.85*G.intensity); G.kick=1.4; G.hueSpike=1.2; G.chromaSpike=1.5;
  // flush the old life out of the feedback tunnel — you snap awake in a new, dark world
  G.decay=0.5; G.flash=0; Post.resize(G.W,G.H);
  spawnFaceRound(); spawnBigFace();
  audio.transcend();
}

function drain(b){
  // touched something bigger than you: it feeds on you. Dodge these.
  const loss=player.mass*0.12;
  player.mass=Math.max(0.4, player.mass-loss);
  b.mass+=loss*0.7;
  G.drainCD=1.1;
  const d=Math.hypot(b.x,b.y)||1;
  b.vx+=b.x/d*player.radius*3;  b.vy+=b.y/d*player.radius*3;   // predator recoils
  player.vx=-b.x/d*player.radius*4; player.vy=-b.y/d*player.radius*4; // the world lurches
  G.kick=Math.min(1.5,G.kick+0.7); G.flashSpike=Math.min(0.9,G.flashSpike+0.2*G.intensity); G.hueSpike+=0.4;
  parts.push({x:0,y:0,life:1,decay:1.2,r0:player.radius*0.5,hue:0,kind:'ring'});
  burst(b.x,b.y,b.radius*0.6,0,10);
  audio.drain();
}

/* --------------------------------- particles ------------------------------ */
const parts=[]; // motes + absorb bursts
function burst(x,y,r,hue,n){
  for(let i=0;i<n;i++){
    const a=srand()*TAU, s=rr(0.5,3)*r;
    parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,decay:rr(0.5,1.4),
      r:rr(0.04,0.14)*r,hue:(hue+gauss(0,40))%360,kind:'spark'});
  }
}
function seedMotes(){
  for(let i=0;i<200;i++){
    const a=srand()*TAU,d=rr(0.2,2.4)*player.radius*6, dep=rr(0.35,1.15);   // depth => parallax
    parts.push({x:Math.cos(a)*d,y:Math.sin(a)*d,vx:gauss(0,4),vy:gauss(0,4),
      life:Infinity,r:rr(0.8,3)*dep,hue:rr(0,360),kind:'mote',ph:srand()*TAU,dep});
  }
}

/* --------- peripheral face flashes (flashed-face-distortion illusion) -------
   Brief, low-contrast faces bloom only in the periphery while the player's gaze
   is pinned to the centred organism. Fixated centrally and glimpsed peripherally,
   the visual system caricatures them — they read as grotesque without ever being
   consciously "seen". A round staggers several around a ring, then they vanish. */
/* ============================================================================
   PROCEDURAL HUMAN FACES  (no photos — shaded, distorted, uncanny)
   Each face is a little genome rendered ONCE into a cached canvas: shaded skin
   with volume, real sockets/eyes/iris/lids, a nose with bridge highlight and
   nostril shadows, lips, brows and hair — then the proportions are pushed just
   off (asymmetry, sunken, sickly) so it reads as a real person who is WRONG.
   ============================================================================ */
function makeFaceG(){
  const sick=srand()<0.5;
  return {
    hue: sick? rr(50,150) : rr(16,34),
    sat: sick? rr(5,16) : rr(14,32),
    light: rr(50,74),
    skew: gauss(0,0.05), asymX: gauss(1,0.05),
    eyeY: rr(-0.02,0.03), eyeGap: rr(0.30,0.40), eyeW: rr(0.15,0.2), eyeH: rr(0.06,0.1),
    eyeLR: gauss(0,0.02), eyeSz: clamp(gauss(1,0.12),0.75,1.3), sunken: rr(0.3,1),
    gazeX: gauss(0,0.22), gazeY: gauss(0.04,0.18),
    iris: pick([26,30,36,40,116,140,205,212]), irisSat: pick([52,46,40,28,22]), irisL: rr(20,44),
    browY: rr(0.13,0.19), browTh: rr(0.015,0.04), browAng: gauss(0,0.22), browDark: rr(12,30),
    noseLen: rr(0.18,0.28), noseW: rr(0.09,0.15),
    mouthY: rr(0.30,0.37), mouthW: rr(0.20,0.32), lip: rr(0.6,1.2),
    open: srand()<0.45? rr(0.05,0.45):0, smile: gauss(-0.12,0.22), mouthX: gauss(0,0.03),
    hair: rr(0,1), hairL: rr(4,14), teeth: srand()<0.4,
  };
}
function softEllipse(ctx,x,y,rx,ry,rot,rgbaInner){
  ctx.save(); ctx.translate(x,y); if(rot) ctx.rotate(rot); ctx.scale(rx,ry);
  const g=ctx.createRadialGradient(0,0,0,0,0,1);
  g.addColorStop(0,rgbaInner); g.addColorStop(1,rgbaInner.replace(/[\d.]+\s*\)$/,'0)'));
  ctx.fillStyle=g; ctx.beginPath(); ctx.arc(0,0,1,0,TAU); ctx.fill(); ctx.restore();
}
function drawEye(ctx,ex,ey,ew,eh,g,skin,dark){
  softEllipse(ctx,ex,ey+eh*0.1,ew*1.2,eh*2.0*g.sunken,0,skin(-16,0.7));   // socket
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(ex-ew,ey); ctx.quadraticCurveTo(ex,ey-eh*1.15,ex+ew,ey);
  ctx.quadraticCurveTo(ex,ey+eh*1.05,ex-ew,ey); ctx.closePath(); ctx.clip();
  ctx.fillStyle= dark? 'hsla(40,10%,44%,1)':'hsla(40,16%,86%,1)';               // sclera
  ctx.fillRect(ex-ew,ey-eh*1.4,ew*2,eh*2.8);
  softEllipse(ctx,ex,ey-eh*0.8,ew,eh*0.9,0,'rgba(22,12,10,0.5)');                // lid shadow
  const ir=eh*1.18, ix=ex+g.gazeX*ew*0.5, iy=ey+g.gazeY*eh, il=g.irisL*(dark?0.6:1);
  let gi=ctx.createRadialGradient(ix,iy,ir*0.15,ix,iy,ir);
  gi.addColorStop(0,`hsl(${g.iris|0},${(g.irisSat+8)|0}%,${(il+14)|0}%)`);
  gi.addColorStop(0.7,`hsl(${g.iris|0},${g.irisSat|0}%,${il|0}%)`);
  gi.addColorStop(1,`hsl(${g.iris|0},${clamp(g.irisSat-10,10,60)|0}%,${(il*0.5)|0}%)`);
  ctx.fillStyle=gi; ctx.beginPath(); ctx.arc(ix,iy,ir,0,TAU); ctx.fill();
  ctx.fillStyle='#000'; ctx.beginPath(); ctx.arc(ix,iy,ir*0.46,0,TAU); ctx.fill();     // pupil
  if(!dark){ ctx.fillStyle='rgba(255,255,255,0.85)'; ctx.beginPath(); ctx.arc(ix-ir*0.3,iy-ir*0.35,ir*0.14,0,TAU); ctx.fill(); }
  ctx.restore();
  ctx.strokeStyle=skin(-22,0.8); ctx.lineWidth=Math.max(1,eh*0.2); ctx.lineCap='round';  // upper lid
  ctx.beginPath(); ctx.moveTo(ex-ew,ey); ctx.quadraticCurveTo(ex,ey-eh*1.2,ex+ew,ey); ctx.stroke();
  ctx.strokeStyle=skin(-8,0.4); ctx.lineWidth=Math.max(1,eh*0.1);                          // lower lid
  ctx.beginPath(); ctx.moveTo(ex-ew*0.9,ey+eh*0.05); ctx.quadraticCurveTo(ex,ey+eh*0.9,ex+ew*0.9,ey+eh*0.05); ctx.stroke();
}
function drawMouth(ctx,mx,my,mw,g,dark){
  const lip=g.lip, sm=g.smile, base=g.light*(dark?0.42:1);
  const lipCol=(dl,a=1)=>`hsla(352,${clamp(g.sat+16,12,48)|0}%,${clamp(base-8+dl,4,74)|0}%,${a})`;
  ctx.strokeStyle=`rgba(15,6,8,${dark?0.55:0.75})`; ctx.lineWidth=Math.max(1.5,mw*0.05);   // mouth line
  ctx.beginPath(); ctx.moveTo(mx-mw,my); ctx.quadraticCurveTo(mx,my-sm*mw*0.4,mx+mw,my); ctx.stroke();
  const drop=g.open>0.02? g.open*mw*0.3:0;
  if(g.open>0.02){
    ctx.fillStyle='rgba(8,3,5,0.92)';
    ctx.beginPath(); ctx.ellipse(mx,my+g.open*mw*0.15,mw*0.7,g.open*mw*0.5,0,0,TAU); ctx.fill();
    if(g.teeth){ ctx.fillStyle='rgba(215,210,196,0.65)';
      ctx.beginPath(); ctx.ellipse(mx,my-g.open*mw*0.12,mw*0.6,g.open*mw*0.16,0,0,TAU); ctx.fill(); }
  }
  ctx.fillStyle=lipCol(-4,0.92);                                                            // upper lip
  ctx.beginPath();
  ctx.moveTo(mx-mw,my);
  ctx.quadraticCurveTo(mx-mw*0.5,my-lip*mw*0.14, mx-mw*0.15,my-lip*mw*0.05);
  ctx.quadraticCurveTo(mx,my-lip*mw*0.16, mx+mw*0.15,my-lip*mw*0.05);
  ctx.quadraticCurveTo(mx+mw*0.5,my-lip*mw*0.14, mx+mw,my);
  ctx.quadraticCurveTo(mx,my-sm*mw*0.4, mx-mw,my); ctx.closePath(); ctx.fill();
  ctx.fillStyle=lipCol(5,0.92);                                                             // lower lip
  ctx.beginPath();
  ctx.moveTo(mx-mw*0.9,my+drop);
  ctx.quadraticCurveTo(mx,my+lip*mw*0.34+drop, mx+mw*0.9,my+drop);
  ctx.quadraticCurveTo(mx,my+lip*mw*0.06, mx-mw*0.9,my+drop); ctx.closePath(); ctx.fill();
  softEllipse(ctx,mx,my+lip*mw*0.16+drop,mw*0.4,lip*mw*0.1,0,`hsla(352,${clamp(g.sat+16,12,48)|0}%,${clamp(base+6,5,82)|0}%,0.5)`);
}
function paintHumanFace(ctx, cx, cy, FW, FH, g, dark){
  const bL=g.light*(dark?0.42:1), sat=g.sat, hue=g.hue|0;
  const skin=(dl,a=1)=>`hsla(${hue},${sat|0}%,${clamp(bL+dl,2,97)|0}%,${a})`;
  ctx.save(); ctx.translate(cx,cy); ctx.transform(g.asymX,0,g.skew,1,0,0);
  const hw=FW/2, top=-FH*0.5, chin=FH*0.5, bb=[-hw*1.6,top-FH*0.1,FW*1.6,FH*1.5];
  if(g.hair>0.25){ ctx.fillStyle=`hsla(${hue},${(sat*0.5)|0}%,${(g.hairL*(dark?0.5:1))|0}%,${dark?0.85:1})`;
    ctx.beginPath(); ctx.ellipse(0,top+FH*0.17,hw*1.18,FH*0.36,0,0,TAU); ctx.fill(); }
  ctx.beginPath();                                                                          // face silhouette
  ctx.moveTo(-hw,-FH*0.1);
  ctx.bezierCurveTo(-hw,top+FH*0.02,-hw*0.55,top,0,top);
  ctx.bezierCurveTo(hw*0.55,top,hw,top+FH*0.02,hw,-FH*0.1);
  ctx.bezierCurveTo(hw,FH*0.17,hw*0.8,FH*0.35,hw*0.42,chin*0.86);
  ctx.bezierCurveTo(hw*0.2,chin,-hw*0.2,chin,-hw*0.42,chin*0.86);
  ctx.bezierCurveTo(-hw*0.8,FH*0.35,-hw,FH*0.17,-hw,-FH*0.1);
  ctx.closePath();
  ctx.save(); ctx.clip();
  ctx.fillStyle=skin(0); ctx.fillRect(bb[0],bb[1],bb[2],bb[3]);
  let gr=ctx.createRadialGradient(0,-FH*0.1,FH*0.04,0,-FH*0.04,FH*0.72);                     // volume light
  gr.addColorStop(0,skin(dark?7:11,0.95)); gr.addColorStop(1,skin(0,0));
  ctx.fillStyle=gr; ctx.fillRect(bb[0],bb[1],bb[2],bb[3]);
  gr=ctx.createRadialGradient(0,0,FH*0.22,0,0,FH*0.56);                                       // edge shadow
  gr.addColorStop(0,skin(0,0)); gr.addColorStop(1,skin(-17,0.9));
  ctx.fillStyle=gr; ctx.fillRect(bb[0],bb[1],bb[2],bb[3]);
  softEllipse(ctx,0,chin*0.72,hw*0.72,FH*0.17,0,skin(-20,0.55));                             // jaw
  softEllipse(ctx,-hw*0.62,FH*0.17,hw*0.3,FH*0.22,0,skin(-15,0.4*g.sunken));                 // gaunt cheeks
  softEllipse(ctx, hw*0.62,FH*0.17,hw*0.3,FH*0.22,0,skin(-15,0.4*g.sunken));
  softEllipse(ctx,-hw*0.82,-FH*0.2,hw*0.34,FH*0.24,0,skin(-14,0.5));                          // temples
  softEllipse(ctx, hw*0.82,-FH*0.2,hw*0.34,FH*0.24,0,skin(-14,0.5));
  ctx.restore();
  const eyeY=g.eyeY*FH, gap=g.eyeGap*FW, ew=g.eyeW*FW;
  drawEye(ctx,-gap/2, eyeY - g.eyeLR*FH, ew, g.eyeH*FH*g.eyeSz, g, skin, dark);
  drawEye(ctx, gap/2, eyeY + g.eyeLR*FH, ew, g.eyeH*FH/g.eyeSz, g, skin, dark);
  ctx.strokeStyle=`hsla(${hue},${(sat*0.7)|0}%,${(g.browDark*(dark?0.6:1))|0}%,${dark?0.7:0.92})`;
  ctx.lineWidth=Math.max(1.5,g.browTh*FH); ctx.lineCap='round';
  for(const s of [-1,1]){
    const bx=s*gap/2, sEyeY=eyeY + s*g.eyeLR*FH;
    const by=sEyeY - g.eyeH*FH*1.8 - g.browY*FH*0.12;   // sit just above the eye
    const arch=FH*(0.03+Math.abs(g.browAng)*0.4), tilt=g.browAng*FH*0.18*s;
    ctx.beginPath();                                     // a single smooth arch (never a W)
    ctx.moveTo(bx-ew*1.05, by - tilt);
    ctx.quadraticCurveTo(bx, by-arch, bx+ew*1.05, by + tilt);
    ctx.stroke();
  }
  const noseTop=eyeY+FH*0.02, noseBot=eyeY+g.noseLen*FH, nw=g.noseW*FW;
  softEllipse(ctx,-nw*0.5,(noseTop+noseBot)/2,nw*0.5,(noseBot-noseTop)*0.6,0,skin(-13,0.5));
  softEllipse(ctx, nw*0.5,(noseTop+noseBot)/2,nw*0.5,(noseBot-noseTop)*0.6,0,skin(-13,0.5));
  softEllipse(ctx,0,noseTop+FH*0.02,nw*0.4,(noseBot-noseTop)*0.5,0,skin(dark?6:12,0.6));      // bridge
  softEllipse(ctx,0,noseBot,nw*0.7,FH*0.05,0,skin(dark?4:8,0.5));                              // tip
  ctx.fillStyle=skin(-24,0.85);
  for(const s of [-1,1]){ ctx.beginPath(); ctx.ellipse(s*nw*0.5,noseBot+FH*0.005,nw*0.28,nw*0.2,s*0.3,0,TAU); ctx.fill(); }
  softEllipse(ctx,0,noseBot+FH*0.03,nw*1.1,FH*0.05,0,skin(-14,0.5));
  drawMouth(ctx, g.mouthX*FW, g.mouthY*FH, g.mouthW*FW, g, dark);
  ctx.restore();
}
function renderFaceImg(g, dark, halo){
  const BW=200, BH=262;
  const cv=document.createElement('canvas'); cv.width=BW; cv.height=BH;
  const c=cv.getContext('2d');
  if(halo){ const gr=c.createRadialGradient(BW/2,BH/2,0,BW/2,BH/2,BH*0.5);   // dark backing survives neon
    gr.addColorStop(0,'rgba(3,2,5,0.82)'); gr.addColorStop(0.7,'rgba(3,2,5,0.45)'); gr.addColorStop(1,'rgba(3,2,5,0)');
    c.fillStyle=gr; c.fillRect(0,0,BW,BH); }
  paintHumanFace(c, BW/2, BH*0.5, BW*0.82, BH*0.86, g, dark);
  return cv;
}

const faces=[];
function spawnFaceRound(){
  const n=ri(3,6), baseAng=srand()*TAU, ring=rr(0.6,0.92);
  for(let i=0;i<n;i++){
    faces.push({
      ang: baseAng + i/n*TAU + gauss(0,0.22),
      rad: clamp(ring + gauss(0,0.05), 0.55, 0.95),
      size: rr(0.08,0.15),
      // slow, natural swell + dissolve, spread across the round like a real trip
      t0: G.t, delay: srand()*1.4, dur: rr(0.6,1.4),
      tilt: gauss(0,0.35), img: renderFaceImg(makeFaceG(), false, true),
    });
  }
}
function drawFaces(){
  if(!faces.length) return;
  const w=G.W,h=G.H, half=Math.min(w,h)/2;
  sctx.globalCompositeOperation='source-over';
  for(let i=faces.length-1;i>=0;i--){
    const f=faces[i];
    const age=G.t - f.t0 - f.delay;
    if(age<0) continue;
    if(age>f.dur){ faces.splice(i,1); continue; }
    const a=smooth(Math.sin(Math.PI*age/f.dur));   // gentle ease in/out
    const cx=w/2+Math.cos(f.ang)*f.rad*half, cy=h/2+Math.sin(f.ang)*f.rad*half;
    const Hh=f.size*half*2.4*(0.9+0.14*a), Ww=Hh*(f.img.width/f.img.height);
    sctx.save();
    sctx.globalAlpha=a*0.42;                       // subtler — glimpsed, not stared at
    sctx.translate(cx,cy); sctx.rotate(f.tilt);
    sctx.drawImage(f.img,-Ww/2,-Hh/2,Ww,Hh);
    sctx.restore();
  }
  sctx.globalAlpha=1;
}

/* ---------- shadow people + crawlers: crisp, subtle intrusions on an OVERLAY ----------
   Drawn on the veil canvas that sits ABOVE the trip, so the screen-blend feedback can't
   wash these darks out. Datura's signature: figures that watch from the edges, and things
   that skitter through your peripheral vision. */
const veilEl=document.getElementById('veil');
const vctx=veilEl.getContext('2d');

// Bodiless faces — no figures. Distorted, tinted (never plain grey), and kept subtle: they
// surface out of the dark in your peripheral vision, drift, and dissolve.
const shades=[];
function renderShadeImg(g){
  const BW=220, BH=278, cv=document.createElement('canvas'); cv.width=BW; cv.height=BH;
  const c=cv.getContext('2d');
  const gr=c.createRadialGradient(BW/2,BH/2,0,BW/2,BH/2,BH*0.5);   // soft shadow it emerges from
  gr.addColorStop(0,'rgba(0,0,0,0.5)'); gr.addColorStop(0.75,'rgba(0,0,0,0.22)'); gr.addColorStop(1,'rgba(0,0,0,0)');
  c.fillStyle=gr; c.fillRect(0,0,BW,BH);
  paintHumanFace(c, BW/2, BH*0.5, BW*0.8, BH*0.84, g, true);
  return cv;
}
function spawnShade(){
  if(shades.length>=3) return;
  const g=makeFaceG(); g.sat=rr(7,17); g.hue=(G.hue*57.3 + gauss(0,55))%360;   // tinted toward the palette
  shades.push({ ang:srand()*TAU, rad:rr(0.55,0.95), size:rr(0.16,0.46),
    t0:G.t, dur:rr(3.6,6.5), drift:gauss(0,0.018), tilt:gauss(0,0.18), img: renderShadeImg(g) });
}
function drawShades(){
  const w=G.W,h=G.H, mn=Math.min(w,h);
  for(let i=shades.length-1;i>=0;i--){
    const s=shades[i]; const age=G.t-s.t0;
    if(age>s.dur){ shades.splice(i,1); continue; }
    const env=Math.min(1,age/1.5)*Math.min(1,(s.dur-age)/1.5);
    const alpha=clamp(env,0,1)*0.3;                                 // subtle
    if(alpha<=0.01) continue;
    s.rad += s.drift*G.dt;
    const cx=w/2+Math.cos(s.ang)*s.rad*mn, cy=h/2+Math.sin(s.ang)*s.rad*mn;
    const H=s.size*mn, Ww=H*(s.img.width/s.img.height);
    vctx.save(); vctx.globalAlpha=alpha; vctx.translate(cx,cy); vctx.rotate(s.tilt);
    vctx.drawImage(s.img,-Ww/2,-H/2,Ww,H); vctx.restore();
  }
  vctx.globalAlpha=1;
}

const crawlers=[];
function spawnCrawler(){
  if(crawlers.length>=3) return;
  const a=srand()*TAU;
  crawlers.push({ x:0.5+Math.cos(a)*0.75, y:0.5+Math.sin(a)*0.75,
    vx:-Math.cos(a)*rr(0.05,0.12)+gauss(0,0.02), vy:-Math.sin(a)*rr(0.05,0.12)+gauss(0,0.02),
    legs:ri(5,8), size:rr(0.01,0.024), ph:srand()*TAU, t0:G.t, dur:rr(3,6) });
}
function drawCrawlers(dt){
  const w=G.W,h=G.H;
  for(let i=crawlers.length-1;i>=0;i--){
    const c=crawlers[i]; const age=G.t-c.t0;
    c.x+=(c.vx+Math.sin(G.t*19+c.ph)*0.02)*dt; c.y+=(c.vy+Math.cos(G.t*23+c.ph)*0.02)*dt;
    if(age>c.dur||c.x<-0.12||c.x>1.12||c.y<-0.12||c.y>1.12){ crawlers.splice(i,1); continue; }
    const env=Math.min(1,age/0.5)*Math.min(1,(c.dur-age)/0.5);
    const cx=c.x*w, cy=c.y*h, s=c.size*Math.min(w,h), ang=Math.atan2(c.vy,c.vx);
    vctx.save(); vctx.globalAlpha=clamp(env,0,1)*0.55; vctx.strokeStyle='#000';
    vctx.lineWidth=Math.max(1,s*0.16); vctx.lineCap='round';
    for(let L=0;L<c.legs;L++){
      const t=(L/(c.legs-1)-0.5), la=(ang+Math.PI/2)+Math.sin(G.t*17+L+c.ph)*0.5;
      const bx=cx+Math.cos(ang)*t*s*1.7, by=cy+Math.sin(ang)*t*s*1.7;
      vctx.beginPath(); vctx.moveTo(bx,by); vctx.lineTo(bx+Math.cos(la)*s*1.6,by+Math.sin(la)*s*1.6); vctx.stroke();
      vctx.beginPath(); vctx.moveTo(bx,by); vctx.lineTo(bx-Math.cos(la)*s*1.6,by-Math.sin(la)*s*1.6); vctx.stroke();
    }
    vctx.fillStyle='#000'; vctx.beginPath(); vctx.ellipse(cx,cy,s*1.5,s*0.75,ang,0,TAU); vctx.fill();
    vctx.restore();
  }
  vctx.globalAlpha=1;
}

/* ---------- negative-afterimage "burns": faint inverted outlines flashed for a beat;
   the feedback pipeline smears them into drifting retinal ghosts around the centre. */
const APP=['eyes','face','figure'];
let burn=null;
function spawnBurn(){
  const full = srand() < 0.3*Math.min(1, G.asc + G.trip*0.3); // rare 1-beat full-frame subliminal
  burn={ type:pick(APP), t0:G.t, dur: full?0.06:rr(0.09,0.18),
    x: full?0.5:rr(0.28,0.72), y: full?0.5:rr(0.28,0.72), scale: full?1.5:rr(0.3,0.7), full };
}
function drawBurn(){
  if(!burn) return; const age=G.t-burn.t0;
  if(age>burn.dur){ burn=null; return; }
  const a=burn.full?1:Math.sin(Math.PI*age/burn.dur);
  const w=G.W,h=G.H, half=Math.min(w,h)/2, cx=burn.x*w, cy=burn.y*h, R=burn.scale*half;
  sctx.save(); sctx.globalCompositeOperation='lighter';
  sctx.globalAlpha=(burn.full?0.05:0.26)*a; sctx.strokeStyle='#dffcff'; sctx.lineWidth=Math.max(1.2,R*0.02);
  if(burn.type==='eyes'){
    for(const dx of [-1,1]){
      sctx.beginPath(); sctx.ellipse(cx+dx*R*0.5,cy,R*0.4,R*0.22,0,0,TAU); sctx.stroke();
      sctx.beginPath(); sctx.arc(cx+dx*R*0.5,cy,R*0.11,0,TAU); sctx.stroke();
    }
  } else if(burn.type==='face'){
    sctx.beginPath(); sctx.ellipse(cx,cy,R*0.52,R*0.72,0,0,TAU); sctx.stroke();
    sctx.beginPath(); sctx.ellipse(cx-R*0.2,cy-R*0.12,R*0.11,R*0.15,0,0,TAU); sctx.stroke();
    sctx.beginPath(); sctx.ellipse(cx+R*0.2,cy-R*0.12,R*0.11,R*0.15,0,0,TAU); sctx.stroke();
    sctx.beginPath(); sctx.moveTo(cx-R*0.18,cy+R*0.3); sctx.quadraticCurveTo(cx,cy+R*0.1,cx+R*0.18,cy+R*0.3); sctx.stroke();
  } else {
    sctx.beginPath(); sctx.arc(cx,cy-R*0.5,R*0.15,0,TAU); sctx.stroke();
    sctx.beginPath();
    sctx.moveTo(cx,cy-R*0.35); sctx.lineTo(cx,cy+R*0.38);
    sctx.moveTo(cx,cy-R*0.2); sctx.lineTo(cx-R*0.3,cy+R*0.02);
    sctx.moveTo(cx,cy-R*0.2); sctx.lineTo(cx+R*0.3,cy+R*0.02);
    sctx.moveTo(cx,cy+R*0.38); sctx.lineTo(cx-R*0.22,cy+R*0.8);
    sctx.moveTo(cx,cy+R*0.38); sctx.lineTo(cx+R*0.22,cy+R*0.8);
    sctx.stroke();
  }
  sctx.restore();
}

/* ---------- ROTATING-SNAKES rings (peripheral drift illusion, Kitaoka construction):
   repeating asymmetric luminance patches — black, dark-blue, white, light-yellow — that are
   OBJECTIVELY STATIC. Reading the periphery (which this game demands) fires the microsaccades
   that set them spinning. The motion you see is made entirely by your own eyes. ---------- */
let snakeCfg=null;
function buildSnakes(){
  snakeCfg={ rings:[ {r:rr(0.58,0.66), n:ri(48,72)&~3, w:rr(0.05,0.07), dir:1},
                     {r:rr(0.78,0.88), n:ri(60,88)&~3, w:rr(0.05,0.075), dir:-1} ],
             hue:(G.realm*47+200)%360, rot:srand()*TAU };
}
function drawSnakes(){
  if(!snakeCfg) return;
  const vis=clamp((G.trip-0.22)*1.5,0,1)*(1-G.hyper)*0.72*G.intensity;
  if(vis<=0.02) return;
  const w=G.W,h=G.H, mn=Math.min(w,h)/2;
  snakeCfg.rot += G.dt*0.01;      // barely moving — the spin is yours
  const steps=[[0,0],[0.35,1],[1,0],[0.65,2]];   // [luminance, 0=achromatic 1=dark-col 2=light-col]
  for(const ring of snakeCfg.rings){
    const R=ring.r*mn, W=ring.w*mn, n=ring.n, seg=TAU/n;
    for(let i=0;i<n;i++){
      const a0=ring.dir*(i*seg)+snakeCfg.rot, a1=a0+ring.dir*seg*0.98;
      const st=steps[i%4];
      vctx.globalAlpha=vis*(st[0]===0?0.8:0.7);
      vctx.fillStyle= st[1]===1? `hsl(${snakeCfg.hue|0},72%,26%)`
                    : st[1]===2? `hsl(${(snakeCfg.hue+160)%360|0},80%,68%)`
                    : (st[0]===0?'#000':'#fff');
      vctx.beginPath();
      vctx.arc(w/2,h/2,R+W/2,a0,a1,ring.dir<0);
      vctx.arc(w/2,h/2,R-W/2,a1,a0,ring.dir>=0);
      vctx.closePath(); vctx.fill();
    }
  }
  vctx.globalAlpha=1;
}
function drawGarden(){
  const gd=G.garden; if(!gd.length) return;
  const w=G.W,h=G.H, mn=Math.min(w,h)/2;
  for(let i=gd.length-1;i>=0;i--){
    const g2=gd[i]; const age=G.t-g2.t0;
    if(age>g2.dur){ gd.splice(i,1); continue; }
    const env=Math.min(1,age/4)*Math.min(1,(g2.dur-age)/4);
    const gx=w/2+Math.cos(g2.a)*g2.r*mn, gy=h/2+Math.sin(g2.a)*g2.r*mn, GR=g2.R*mn;
    const gg=vctx.createRadialGradient(gx,gy,0,gx,gy,GR);
    gg.addColorStop(0,hsl(g2.hue,42,58,0.12*env)); gg.addColorStop(1,hsl(g2.hue,42,58,0));
    vctx.fillStyle=gg; vctx.beginPath(); vctx.arc(gx,gy,GR,0,TAU); vctx.fill();
  }
}
/* ---------- THE AFTERIMAGE RITE: a saturated complementary wheel is held perfectly
   still around the fixation point while everything else recedes. The player, entranced,
   keeps staring. Cut to white — and the complementary ghost blooms in their own retina,
   painted by photoreceptor fatigue. Colour washes, then it all fades back in as if
   nothing happened. ---------- */
function drawRite(){
  if(G.rite==='idle') return;
  const w=G.W,h=G.H,cx=w/2,cy=h/2,mn=Math.min(w,h);
  if(G.rite==='charge'){
    const a=smooth(Math.min(1,G.riteT*1.35));
    vctx.globalAlpha=a*0.97;
    const n=6, R=mn*0.34;
    for(let k=0;k<n;k++){
      const ang=k/n*TAU-Math.PI/2;
      vctx.fillStyle= k%2? 'hsl(300,100%,50%)' : 'hsl(140,100%,44%)';
      vctx.beginPath();
      vctx.ellipse(cx+Math.cos(ang)*R*0.55, cy+Math.sin(ang)*R*0.55, R*0.44, R*0.2, ang, 0, TAU);
      vctx.fill();
    }
    vctx.fillStyle='hsl(220,100%,52%)';
    vctx.beginPath(); vctx.arc(cx,cy,R*0.2,0,TAU); vctx.fill();
    vctx.fillStyle='#fff';
    vctx.beginPath(); vctx.arc(cx,cy,mn*0.005,0,TAU); vctx.fill();
  } else if(G.rite==='white'){
    vctx.globalAlpha=1; vctx.fillStyle='#fff'; vctx.fillRect(0,0,w,h);
  } else if(G.rite==='wash'){
    vctx.globalAlpha=1; vctx.fillStyle=`hsl(${(G.t*520)%360|0},95%,55%)`; vctx.fillRect(0,0,w,h);
  } else if(G.rite==='fade'){
    vctx.globalAlpha=1-smooth(G.riteT);
    vctx.fillStyle=`hsl(${(G.t*520)%360|0},95%,55%)`; vctx.fillRect(0,0,w,h);
  }
  vctx.globalAlpha=1;
}

function drawVeil(){
  vctx.clearRect(0,0,G.W,G.H);
  drawSnakes();
  drawGarden();
  drawShades();
  drawCrawlers(G.dt);
  drawRite();
}

/* ---------- REALMS: while ascended you drift between these visual regimes. Each is a set
   of DELTAS from the base look — palette rotation, saturation, warp/chroma, spiral, the
   direction of the feedback flow, spin, being-speed, grain and vignette. Index 0 is neutral
   (what you see un-ascended); the rest are the places SHIFT takes you. ---------- */
const REALMS=[
  {hueRot:0,    sat:0,    warp:0,   chroma:0,   kal:0,   spiral:0,   flowZ:0,     flowR:0,     spin:0,    spd:0,    grain:0,    vig:0},
  {hueRot:-1.6, sat:0.35, warp:0.3, chroma:0.3, kal:0.1, spiral:0.5, flowZ:-0.010,flowR:0.006, spin:0.22, spd:0.2,  grain:0,    vig:0.1},   // ember
  {hueRot:2.4,  sat:0.1,  warp:0.2, chroma:0.4, kal:0.0, spiral:0.7, flowZ:0.012, flowR:-0.005,spin:-0.2, spd:-0.2, grain:0,    vig:0.3},   // abyss
  {hueRot:-3.4, sat:0.5,  warp:0.4, chroma:0.35,kal:0.28,spiral:0.6, flowZ:-0.014,flowR:0.011, spin:0.35, spd:0.45, grain:0,    vig:-0.1},  // bloom
  {hueRot:0.6,  sat:-0.6, warp:0.7, chroma:0.6, kal:0.0, spiral:0.2, flowZ:0.004, flowR:0.002, spin:0.05, spd:-0.1, grain:0.12, vig:0.25},  // bone
  {hueRot:1.4,  sat:0.35, warp:0.2, chroma:0.2, kal:0.16,spiral:0.4, flowZ:-0.006,flowR:0.009, spin:0.2,  spd:0.1,  grain:0,    vig:0},     // verdant
  {hueRot:-2.6, sat:0.7,  warp:0.7, chroma:0.9, kal:0.42,spiral:1.0, flowZ:-0.02, flowR:0.02,  spin:0.5,  spd:0.6,  grain:0.04, vig:-0.1},  // fever
  {hueRot:0.2,  sat:-0.9, warp:0.1, chroma:0.1, kal:0.0, spiral:0.1, flowZ:0.002, flowR:0.0,   spin:0.02, spd:-0.3, grain:0.02, vig:0.5},   // void
];

/* ---------- MASSIVE, near-invisible faces that bleed out of the current background.
   Rendered desaturated and blended with soft-light so they modulate the luminance already
   on screen — they emerge where the background has colour, blending in but never perfectly.
   Random sizes up to enormous; slow to materialise and dissolve; very hard to catch. ---------- */
const bigFaces=[];
function spawnBigFace(){
  const g=makeFaceG(); g.sat=rr(9,20); g.hue=(G.hue*57.3 + gauss(0,60))%360;  // faintly tinted toward the palette, not grey
  g.hairL=Math.max(g.hairL,9);
  bigFaces.push({
    img: renderFaceImg(g,false,false),
    size: rr(0.5,1.45), ang: srand()*TAU, rad: rr(0.05,0.7), rot: gauss(0,0.18),
    t0:G.t, dur: rr(6,12), alpha: rr(0.04,0.1),
  });
}
function drawBigFaces(){
  if(!bigFaces.length) return;
  const w=G.W,h=G.H, mn=Math.min(w,h);
  for(let i=bigFaces.length-1;i>=0;i--){
    const f=bigFaces[i]; const age=G.t-f.t0;
    if(age>f.dur){ bigFaces.splice(i,1); continue; }
    const a=smooth(Math.sin(Math.PI*age/f.dur));
    const cx=w/2+Math.cos(f.ang)*f.rad*mn, cy=h/2+Math.sin(f.ang)*f.rad*mn;
    const Hh=f.size*mn, Ww=Hh*(f.img.width/f.img.height);
    sctx.save(); sctx.translate(cx,cy); sctx.rotate(f.rot);
    sctx.globalCompositeOperation='soft-light'; sctx.globalAlpha=f.alpha*a;      // blends into lit background
    sctx.drawImage(f.img,-Ww/2,-Hh/2,Ww,Hh);
    sctx.globalCompositeOperation='lighter'; sctx.globalAlpha=f.alpha*a*0.25;     // a whisper even on the black
    sctx.drawImage(f.img,-Ww/2,-Hh/2,Ww,Hh);
    sctx.restore();
  }
  sctx.globalAlpha=1; sctx.globalCompositeOperation='source-over';
}

/* =====================================================================
   UPDATE
   ===================================================================== */
function update(dt){
  G.t += dt;

  // ---- brief fixation, then the trip is ON almost immediately ----
  if(G.phase==='fixate'){
    G.fixate -= dt;
    if(G.fixate<=0){ G.phase='open'; for(let i=0;i<26;i++) spawnBeing(); }
  }
  const opened = G.phase!=='fixate';

  // ---- controls: WASD moves the world; you stay dead centre and ALWAYS in control ----
  let kx=(keys.has('d')||keys.has('arrowright'))-(keys.has('a')||keys.has('arrowleft'));
  let ky=(keys.has('s')||keys.has('arrowdown'))-(keys.has('w')||keys.has('arrowup'));
  const moving=(kx||ky)?1:0;

  // ---- stillness IS the deepest input. Idle and the meditation grows — visuals slow and
  // deepen, the music thins into something colder. The first touch after long stillness
  // lands like a hammer: the longer you were gone, the harder reality snaps back. ----
  if(moving && G.still>8){
    const imp=clamp(G.still/40,0.3,1.2);
    G.kick=Math.min(1.6,G.kick+imp); G.warpSpike+=0.5*imp; G.chromaSpike+=0.6*imp;
    G.flashSpike=Math.min(0.9,G.flashSpike+0.25*imp*G.intensity);
    parts.push({x:0,y:0,life:1,decay:0.7,r0:player.radius*0.9,hue:player.hue,kind:'ring'});
    audio.impact(imp);
  }
  if(moving||G.shiftHeld) G.still=0; else G.still+=dt;
  G.med=lerp(G.med, clamp((G.still-6)/30,0,1), 1-Math.pow(0.3,dt));

  // ---- the afterimage rite: rarely, the game becomes the oldest illusion of all.
  // A saturated wheel burns in while you hold the centre... then pure white — and the
  // ghost you see there is painted by your own retina. Then colour, then nothing happened.
  if(opened && G.rite==='idle'){
    G.riteTimer-=dt;
    if(G.riteTimer<=0 && !G.transReady && G.hyper<0.3){ G.rite='charge'; G.riteT=0; }
  } else if(G.rite==='charge'){ G.riteT+=dt/15; if(G.riteT>=1){ G.rite='white'; G.riteT=0; audio.duck(2.6); } }
  else if(G.rite==='white'){ G.riteT+=dt/2.3; if(G.riteT>=1){ G.rite='wash'; G.riteT=0; } }
  else if(G.rite==='wash'){ G.riteT+=dt/1.6; if(G.riteT>=1){ G.rite='fade'; G.riteT=0; } }
  else if(G.rite==='fade'){ G.riteT+=dt/2.5; if(G.riteT>=1){ G.rite='idle'; G.riteTimer=rr(240,480); } }

  // ---- SHIFT: dash — and, when the mandala is in bloom, hold it to CHARGE TRANSCENDENCE ----
  G.shift = lerp(G.shift, G.shiftHeld?1:0, 1-Math.pow(0.02,dt));
  if(G.transReady && G.shiftHeld){
    G.transCharge=Math.min(1, G.transCharge+dt/2.6);
    if(G.transCharge>=1) rebirth();
  } else {
    G.transCharge=Math.max(0, G.transCharge-dt*0.7);
  }
  const tc=smooth(G.transCharge);
  const asc = clamp(G.shift*0.3 + tc*1.2, 0, 1.3); G.asc=asc;   // rush amount for the visuals
  const rj = G.open;
  G.travel=Math.max(0,G.travel-dt*0.5);
  const tv=smooth(G.travel);
  const rm=G.rm, RT=REALMS[G.realm];
  for(const k in rm) rm[k]=lerp(rm[k], (RT[k]||0), 0.02);      // this cycle's realm bleeds in slowly
  G.hyper = clamp(tv*0.8 + tc*0.75 + G.shift*0.1, 0, 1);

  // pace + trip: trippier the bigger you are, the longer you play, and — permanently —
  // the more cycles you've transcended. Each rebirth loosens reality's grip a little more.
  if(opened) G.tripTime += dt;
  G.pace = clamp(0.4 + G.tripTime*0.02 + Math.log2(1+player.mass)*0.03 + G.depth*0.06, 0.4, 2.2);
  G.trip = clamp(Math.log2(1+player.mass)*0.1 + G.tripTime*0.005 + G.depth*0.16 + asc*0.5 + tv*0.4 + G.med*0.45, 0, 2.6);
  const trip=G.trip;

  // ---- breathing at 0.1 Hz — six breaths a minute, the resonance frequency of calm.
  // The mandala, the drone's swell and the warp all inhale together; the player entrains.
  G.breath = 0.5+0.5*Math.sin(G.t*0.628);
  if(opened){
    G.surgeTimer -= dt*G.pace;
    if(G.surgeTimer<=0){ G.surge=1; G.surgeTimer=rr(12,24); audio.surge(); }
  }
  G.surge=Math.max(0,G.surge-dt*0.22);
  const surge=smooth(G.surge);

  // ---- fractionation: the classic hypnotic deepening cycle — every minute or so the
  // whole trip SOFTENS for a few breaths... then plunges deeper than before ----
  G.liftTimer-=dt;
  if(opened && G.liftTimer<=0){ G.lift=1; G.liftFired=false; G.liftTimer=rr(55,90); }
  if(G.lift>0){ G.lift=Math.max(0,G.lift-dt/7);
    if(!G.liftFired && G.lift<0.5){ G.liftFired=true; G.surge=1; G.tripTime+=3; audio.surge(); } }
  const lift = G.lift>0.5 ? smooth((G.lift-0.5)*2) : 0;

  // ---- illusions: begin immediately, escalate with trip/ascension, mixed per-biome ----
  if(opened){
    const bi=G.biome?G.biome.ill:{face:1,burn:1,shade:1,crawl:1,big:1,eye:1};
    G.faceTimer -= dt;
    if(G.faceTimer<=0){ spawnFaceRound(); G.faceTimer = rr(3.5,7)/((0.7+G.pace*0.4+trip*0.7+asc*2)*bi.face); }
    G.bigFaceTimer -= dt;
    if(G.bigFaceTimer<=0){ spawnBigFace(); G.bigFaceTimer = rr(6,13)/((0.6+trip*0.5+asc*1.5)*bi.big); }
    G.burnTimer -= dt;
    if(G.burnTimer<=0){ spawnBurn(); G.burnTimer = rr(3.5,7)/((0.6+trip+asc*2.5)*bi.burn); }
    G.shadeTimer -= dt;
    if(G.shadeTimer<=0){ if(trip>0.15||asc>0.3) spawnShade(); G.shadeTimer = rr(7,13)/((0.5+trip+asc*2.5)*bi.shade); }
    G.crawlTimer -= dt;
    if(G.crawlTimer<=0){ if(trip>0.25||asc>0.4) spawnCrawler(); G.crawlTimer = rr(8,16)/((0.5+trip+asc*2.5)*bi.crawl); }
    G.eyeTimer -= dt;
    if(G.eyeTimer<=0){ if(trip>0.1) spawnEyeWave(); G.eyeTimer = rr(9,17)/((0.5+trip*0.8+asc)*bi.eye); }
  }
  G.eyeDilate=Math.max(0,G.eyeDilate-dt*0.45);

  // ---- player movement (WASD); SHIFT rushes you faster while you ascend ----
  const spd=player.radius*(1.9+1.6*G.pace)*(1+surge*0.4)*(1 + G.shift*3 + asc*0.8);
  let wvx=0,wvy=0;
  if(kx||ky){ const km=Math.hypot(kx,ky); wvx=kx/km*spd; wvy=ky/km*spd; }
  player.vx=lerp(player.vx,wvx,1-Math.pow(0.0015,dt));
  player.vy=lerp(player.vy,wvy,1-Math.pow(0.0015,dt));
  const shx=-player.vx*dt, shy=-player.vy*dt;
  player.spin += dt*(0.15*(1+surge) + rm.spin*rj);
  player._pmx=lerp(player._pmx, G.W/2 + player.vx*0.12, 0.12);
  player._pmy=lerp(player._pmy, G.H/2 + player.vy*0.12, 0.12);

  // radius/scale from mass (infinite growth; camera falls away). Charging transcendence pulls you out of body.
  player.radius = player.R0*Math.sqrt(player.mass/player.mass0);
  G.scale = G.targetScreenR/player.radius * (1 - tc*0.4 - G.shift*0.06);

  // evolution progress toward the next metamorphosis (drives the mandala's arc)
  if(!G.transReady){
    const lo=G.stage===0?1:stageThreshold(G.stage-1), hi=stageThreshold(G.stage);
    G.evoProg=clamp((Math.log(player.mass)-Math.log(lo))/(Math.log(hi)-Math.log(lo)),0,1);
  } else G.evoProg=1;
  G.drainCD=Math.max(0,G.drainCD-dt);


  // ---- shift the whole world to keep player centered ----
  for(const b of beings){ b.x+=shx; b.y+=shy; }
  for(const p of parts){ p.x+=shx; p.y+=shy; }
  for(const g2 of gates){ g2.x+=shx; g2.y+=shy; }

  // ---- reality gates: two futures surface as the metamorphosis ripens; steer into one ----
  if(opened && !G.transReady && G.evoProg>0.7 && gates.length===0) spawnGates();
  for(let i=gates.length-1;i>=0;i--){
    const g2=gates[i], d2=Math.hypot(g2.x,g2.y);
    if(d2 < g2.r + player.radius*0.6){
      G.nextBiome=g2.bio;
      if(g2.gold) G.goldStreak++; else G.goldStreak=0;
      G.kick=Math.min(1.5,G.kick+0.5); G.hueSpike+=0.5;
      parts.push({x:0,y:0,life:1,decay:0.9,r0:player.radius*0.7,hue:g2.hue,kind:'ring'});
      gates.splice(i,1); if(gates.length) gates.length=0;   // choosing one collapses the other
      audio.surge();
      break;
    }
  }

  // ---- creatures (realm overlays a swirl/flow on their motion & speed) ----
  const viewR=Math.hypot(G.W,G.H)/2/G.scale;
  const swirl=rm.spin*rj, spdMul=1+rm.spd*rj;
  for(let i=beings.length-1;i>=0;i--){
    const b=beings[i];
    b.radius=player.R0*Math.sqrt(b.mass/player.mass0);
    let bx=0,by=0; const d=Math.hypot(b.x,b.y)||1;
    if(b.behavior==='seek'){ bx=-b.x/d; by=-b.y/d; }
    else if(b.behavior==='flee'){ bx=b.x/d; by=b.y/d; }
    else if(b.behavior==='orbit'){ bx=-b.y/d; by=b.x/d; }
    else { b.wa+=gauss(0,1)*dt*2; bx=Math.cos(b.wa); by=Math.sin(b.wa); }
    bx += -b.y/d*swirl*1.6; by += b.x/d*swirl*1.6;                     // realm swirl
    const acc=b.spd*spdMul*(0.5+0.7*G.pace)*(1+surge*0.6)*(1+G.hyper*1.6);
    b.vx=lerp(b.vx, bx*acc, 1-Math.pow(0.02,dt));
    b.vy=lerp(b.vy, by*acc, 1-Math.pow(0.02,dt));
    b.x+=b.vx*dt; b.y+=b.vy*dt; b.spin+=b.spinV*dt;
    b.genome.hue=(b.genome.hue + b.hueDrift*dt*40)%360;
    // occasional wisp trail — more life in the field
    if(srand()<dt*1.5){ parts.push({x:b.x,y:b.y,vx:gauss(0,4),vy:gauss(0,4),life:1,decay:rr(0.8,1.8),
      r:rr(0.03,0.08)*b.radius,hue:(b.genome.hue+gauss(0,30))%360,kind:'spark'}); }
    const dist=Math.hypot(b.x,b.y);
    if(dist < player.radius*0.82 + b.radius*0.28){
      // smaller -> food you become. Bigger -> a predator that feeds on YOU: dodge it.
      if(b.mass > player.mass*1.15){ if(G.drainCD<=0) drain(b); }
      else { graft(b); beings.splice(i,1); continue; }
    }
    if(dist > viewR*2.2){ beings.splice(i,1); }
  }
  if(opened){
    const target = (G.biome?G.biome.spawnTarget:22) + Math.round(10*G.quality);
    let guard=0;
    while(beings.length<target && guard++<6) spawnBeing();
  }

  // ---- particles: motes (parallax depth + realm swirl), sparks, absorb ripples ----
  const moteRot=(0.05 + rm.flowR*rj*26)*dt, mc=Math.cos(moteRot), ms=Math.sin(moteRot);
  for(let i=parts.length-1;i>=0;i--){
    const p=parts[i];
    if(p.kind==='spark'){ p.x+=p.vx*dt; p.y+=p.vy*dt; p.vx*=Math.pow(0.1,dt); p.vy*=Math.pow(0.1,dt);
      p.life-=dt*p.decay; if(p.life<=0){ parts.splice(i,1); continue; } }
    else if(p.kind==='ring'){ p.life-=dt*p.decay; if(p.life<=0){ parts.splice(i,1); continue; } }
    else { // mote: parallax drift + realm rotation + a constant FALL toward the well's centre
      const dep=p.dep||1; p.x+=p.vx*dt*dep; p.y+=p.vy*dt*dep;
      const nx=p.x*mc-p.y*ms, ny=p.x*ms+p.y*mc; p.x=nx; p.y=ny;
      const dd2=Math.hypot(p.x,p.y)||1;
      const fall=viewR*(0.03+0.05*G.hyper+0.02*G.trip)*dep;   // everything is always falling in
      p.x-=p.x/dd2*fall*dt; p.y-=p.y/dd2*fall*dt;
      p.ph+=dt; const dd=Math.hypot(p.x,p.y);
      if(dd<viewR*0.05 || dd>viewR*1.9){ const a2=srand()*TAU,nd=viewR*rr(1.1,1.6);
        p.x=Math.cos(a2)*nd; p.y=Math.sin(a2)*nd; }
    }
  }

  // ---- drive the shader params (realm + travel folded in; blur kept low so it stays playable) ----
  const I=G.intensity;
  G.open = lerp(G.open, opened?1:0, 1-Math.pow(0.05,dt));
  const amb = G.open*(1-lift*0.55);   // fractionation: the lift softens everything at once
  G.warpSpike*=Math.pow(0.02,dt); G.chromaSpike*=Math.pow(0.05,dt);
  G.hueSpike*=Math.pow(0.15,dt);  G.flashSpike*=Math.pow(0.003,dt);
  G.kick*=Math.pow(0.02,dt);
  const tgtWarp   = (0.4 + 0.28*G.breath + trip*0.45 + rm.warp*rj)*amb + surge*0.7 + G.warpSpike + tv*1.6;
  const tgtChroma = ((0.35 + trip*0.6 + rm.chroma*rj)*amb + surge*0.6 + G.chromaSpike + tv*1.6)*I;
  const tgtDecay  = Math.min(0.93, 0.865 + (surge*0.025 + trip*0.015)*amb + G.kick*0.012 + asc*0.02 + tv*0.03);
  const tgtKal    = ((trip*0.25 + rm.kal*rj)*amb + surge*0.4 + tv*0.4)*I;
  const tgtSwirl  = ((Math.sin(G.t*0.13)*0.14 + trip*0.14)*amb + surge*0.25 + asc*0.5 + tv*0.9)*I;
  // THE TUNNEL: steady, one-way, ever-deepening. No sin() => it never changes direction or slows.
  const tgtFeedZ  = -(0.006 + (0.006 + trip*0.004)*amb + asc*0.006 + tv*0.02);   // always inward
  const tgtFeedR  =  (0.004 + (trip*0.0015)*amb + surge*0.003 + asc*0.006 + tv*0.02)*I; // always same spin
  const tgtSpiral = (0.45 + trip*0.8 + rm.spiral*rj)*amb + surge*0.5 + tv*1.2;
  const tgtSat    = 1.15 + (0.15 + trip*0.6 + rm.sat*rj)*amb + tv*0.4;
  G.warp   =lerp(G.warp,tgtWarp, tv>0.02?0.14:0.05);
  G.chroma =lerp(G.chroma,tgtChroma,0.06);
  G.decay  =lerp(G.decay,tgtDecay,0.04);
  G.kaleido=lerp(G.kaleido,tgtKal,0.03);
  G.swirl  =lerp(G.swirl,tgtSwirl,0.06);
  G.feedZoom=lerp(G.feedZoom,tgtFeedZ,0.05);
  G.feedRot =lerp(G.feedRot,tgtFeedR,0.05);
  G.spiral =lerp(G.spiral,tgtSpiral,0.035);
  G.sat    =lerp(G.sat,tgtSat,0.03);
  // realm palette rotation blended into the global hue
  G._hueAcc = (G._hueAcc + dt*((0.06+trip*0.1)*amb + surge*0.25 + asc*0.3) + G.hueSpike*dt*3) % TAU;
  G.realmHue = lerp(G.realmHue, rm.hueRot*rj, 0.02);
  G.hue = G._hueAcc + G.realmHue;
  // 10 Hz alpha shimmer during surges/charge — the flicker band that seeds geometric
  // hallucination (honeycombs, zigzags); tiny amplitude, fully gated by intensity mode
  const alphaShimmer = Math.sin(G.t*62.83)*0.016*(surge*0.7+tc)*I;
  G.flash=lerp(G.flash, G.flashSpike + surge*0.05*I + tv*0.45*I + alphaShimmer, 0.3);
  G.invert = (I>0.5 && (surge>0.9||tv>0.7))? (0.5+0.5*Math.sin(G.t*28))*0.5 : lerp(G.invert,0,0.2);
  G.grain = 0.04 + surge*0.05 + (trip*0.03 + rm.grain*rj)*amb + tv*0.05;
  G.vignette = 0.95 - surge*0.2 + (rm.vig*rj)*amb + tv*0.4;
  G.phos = ((0.016 + trip*0.022 + G.eyeDilate*0.03)*amb + tv*0.04)*I;  // breathing-wall phosphenes
  G.form = ((0.006 + trip*0.013 + G.med*0.012)*amb + tv*0.03)*I;       // honeycomb form-constant
  G.dof  = (0.04 + trip*0.035 + tc*0.06)*amb;                          // the well's depth of field

  // ---- pareidolia: once in a long while, for a breath or two, the mandala almost has a
  // face. Sub-threshold — nothing is ever actually drawn clearly enough to point at. ----
  if(G.parei>0){ G.parei=Math.max(0,G.parei-dt/G.pareiDur); }
  else { G.pareiTimer-=dt;
    if(opened && G.pareiTimer<=0){ G.parei=1; G.pareiDur=rr(1.6,3); G.pareiSeed=srand()*10;
      G.pareiTimer=rr(25,60); } }
  audio.tick(dt, trip, G.realm);                                        // this biome's music breathes

  // ---- Troxler garden: screen-static pastel blooms that your own brain will erase
  // as you hold fixation — and hand back the moment you move ----
  G.gardenTimer-=dt;
  if(opened && G.gardenTimer<=0){ G.gardenTimer=rr(50,90);
    if(trip>0.15 && G.hyper<0.2){ G.garden.length=0;
      for(let i=0;i<4;i++) G.garden.push({ a:srand()*TAU, r:rr(0.5,0.82), hue:rr(0,360),
        R:rr(0.06,0.12), t0:G.t, dur:rr(18,28) }); } }
  // travel gives a brief whoosh of blur; sustained ascension stays legible so you can keep playing
  const blur = tv*tv*4 + asc*0.5;
  if(!Post.is2d) glCanvas.style.filter = blur>0.02 ? `blur(${blur.toFixed(2)}px) saturate(${(1+asc*0.4+tv*0.4).toFixed(2)})` : '';
  veilEl.style.filter = `blur(${(0.35+blur*0.6).toFixed(2)}px)`;   // crisp overlay — HD illusions
}

/* =====================================================================
   RENDER  (draw the world to the 2D scene canvas)
   ===================================================================== */
function hsl(h,s,l,a){ return `hsla(${((h%360)+360)%360},${s|0}%,${l|0}%,${a})`; }

function drawSilhouette(x,y,R,rot,sil,fill,close=true){
  const n=sil.length;
  sctx.beginPath();
  for(let i=0;i<=n;i++){
    const idx=i%n, a=idx/n*TAU+rot, r=sil[idx]*R;
    const px=x+Math.cos(a)*r, py=y+Math.sin(a)*r;
    // smooth blob via midpoint quad curves
    const nx=(i)/n; // unused, keep straightforward
    if(i===0) sctx.moveTo(px,py); else sctx.lineTo(px,py);
  }
  if(close) sctx.closePath();
  sctx.fillStyle=fill; sctx.fill();
}

function drawPart(body, p, cx, cy, R, rot){
  const t=G.t;
  const pulse=1+p.pulseA*Math.sin(t*p.pulseS+p.pulseP + (0.5+0.5*Math.sin(t*0.5)) );
  const a=p.orbitA + t*p.orbitSpeed + rot;
  const px=cx+Math.cos(a)*R*p.orbitR;
  const py=cy+Math.sin(a)*R*p.orbitR;
  const pr=R*p.size*pulse;
  if(pr<0.6) return;
  // frustum cull
  if(px<-pr*3||px>G.W+pr*3||py<-pr*3||py>G.H+pr*3) return;
  const prot=p.rot + t*p.spin;
  const hue=(p.hue + body.hueShift*40)%360;

  const glowOn = pr>3 && G.quality>0.5;
  if(p.kind==='blob'||p.kind==='crystal'){
    if(glowOn){ sctx.globalCompositeOperation='lighter'; sctx.globalAlpha=0.28*p.glow;
      drawSilhouette(px,py,pr*1.35,prot,p.sil,hsl(hue,90,65,1)); }
    sctx.globalCompositeOperation='source-over'; sctx.globalAlpha=p.alpha;
    drawSilhouette(px,py,pr,prot,p.sil,hsl(hue,p.sat,p.light,1));
    sctx.globalCompositeOperation='lighter'; sctx.globalAlpha=0.5;
    drawSilhouette(px,py,pr*0.5,prot,p.sil,hsl(hue,95,80,1));
  }
  else if(p.kind==='star'){
    const n=p.petals*2; sctx.beginPath();
    for(let i=0;i<=n;i++){ const ang=i/n*TAU+prot; const rad=(i%2? p.inner:1)*pr;
      const X=px+Math.cos(ang)*rad, Y=py+Math.sin(ang)*rad; i?sctx.lineTo(X,Y):sctx.moveTo(X,Y);}
    sctx.closePath();
    if(glowOn){ sctx.globalCompositeOperation='lighter'; sctx.globalAlpha=0.3*p.glow;
      sctx.fillStyle=hsl(hue,95,66,1); sctx.fill(); }
    sctx.globalCompositeOperation='source-over'; sctx.globalAlpha=p.alpha;
    sctx.fillStyle=hsl(hue,p.sat,p.light,1); sctx.fill();
  }
  else if(p.kind==='ring'){
    sctx.globalCompositeOperation='lighter'; sctx.globalAlpha=0.9*p.alpha;
    sctx.lineWidth=pr*(1-p.inner)*0.9; sctx.strokeStyle=hsl(hue,p.sat,p.light+8,1);
    sctx.beginPath(); sctx.arc(px,py,pr*(p.inner+ (1-p.inner)/2),0,TAU); sctx.stroke();
  }
  else if(p.kind==='eye'){
    // sclera
    sctx.globalCompositeOperation='source-over'; sctx.globalAlpha=p.alpha;
    sctx.fillStyle=hsl(hue,30,92,1); sctx.beginPath(); sctx.ellipse(px,py,pr,pr*0.72,prot,0,TAU); sctx.fill();
    // iris looks toward pointer (you) / player-center (creatures)
    // your parts look where you travel; every creature's eyes stare at the fixation centre
    const lx = (body.watch?player._pmx:G.W/2)-px, ly=(body.watch?player._pmy:G.H/2)-py;
    const lm=Math.hypot(lx,ly)||1; const io=pr*0.32;
    const ix=px+lx/lm*io, iy=py+ly/lm*io;
    sctx.fillStyle=hsl((hue+180)%360,90,50,1); sctx.beginPath(); sctx.arc(ix,iy,pr*0.5,0,TAU); sctx.fill();
    sctx.fillStyle='#08040c'; sctx.beginPath(); sctx.arc(ix,iy,pr*0.24,0,TAU); sctx.fill();
    sctx.globalCompositeOperation='lighter'; sctx.globalAlpha=0.9;
    sctx.fillStyle='#fff'; sctx.beginPath(); sctx.arc(ix-pr*0.12,iy-pr*0.12,pr*0.08,0,TAU); sctx.fill();
  }
  else if(p.kind==='tentacle'){
    sctx.globalCompositeOperation='lighter'; sctx.globalAlpha=0.85*p.alpha;
    sctx.lineCap='round';
    const segs=p.segs, L=pr*p.len;
    let x=px,y=py, ang=a;
    sctx.beginPath(); sctx.moveTo(x,y);
    for(let i=1;i<=segs;i++){
      ang += Math.sin(t*p.wave + i*0.7 + p.pulseP)*0.5;
      x+=Math.cos(ang)*L/segs; y+=Math.sin(ang)*L/segs;
      sctx.lineTo(x,y);
    }
    sctx.strokeStyle=hsl(hue,p.sat,p.light,1); sctx.lineWidth=pr*p.width*2; sctx.stroke();
    sctx.strokeStyle=hsl(hue,95,82,1); sctx.lineWidth=pr*p.width*0.8; sctx.stroke();
  }
  else if(p.kind==='spore'){
    sctx.globalCompositeOperation='lighter';
    for(let i=0;i<p.dots;i++){ const ang=i/p.dots*TAU+prot; const rad=pr*p.spread*(0.4+0.6*((i*7)%p.dots)/p.dots);
      sctx.globalAlpha=0.7*p.alpha; sctx.fillStyle=hsl((hue+i*8)%360,90,68,1);
      sctx.beginPath(); sctx.arc(px+Math.cos(ang)*rad,py+Math.sin(ang)*rad,pr*0.16,0,TAU); sctx.fill(); }
  }
  else if(p.kind==='helix'){
    // DNA double helix — two intertwined strands with rungs between them
    sctx.globalCompositeOperation='lighter'; sctx.lineCap='round';
    const L=pr*p.len, N=p.rungs, dx=Math.cos(a), dy=Math.sin(a), nx=-dy, ny=dx, aw=pr*p.amp;
    const S=[[],[]];
    for(let i=0;i<=N;i++){ const u=i/N, ph=u*p.freq*TAU + t*1.6 + p.pulseP;
      const bx=px+dx*(u-0.5)*L, by=py+dy*(u-0.5)*L, off=Math.sin(ph)*aw;
      S[0].push([bx+nx*off,by+ny*off]); S[1].push([bx-nx*off,by-ny*off]);
      if(i%1===0 && Math.cos(ph)>0){ sctx.globalAlpha=0.5*p.alpha; sctx.strokeStyle=hsl((hue+u*60)%360,80,72,1);
        sctx.lineWidth=Math.max(1,pr*0.05); sctx.beginPath();
        sctx.moveTo(bx+nx*off,by+ny*off); sctx.lineTo(bx-nx*off,by-ny*off); sctx.stroke(); }
    }
    for(let s=0;s<2;s++){ sctx.globalAlpha=0.9*p.alpha; sctx.strokeStyle=hsl(s?p.hue2:hue,90,66,1);
      sctx.lineWidth=Math.max(1.2,pr*p.width*2); sctx.beginPath();
      for(let i=0;i<S[s].length;i++){ const q=S[s][i]; i?sctx.lineTo(q[0],q[1]):sctx.moveTo(q[0],q[1]); } sctx.stroke(); }
  }
  else if(p.kind==='worm'){
    // a fat segmented, wriggling body that tapers
    sctx.globalCompositeOperation='source-over';
    const segs=p.segs, L=pr*p.len; let x=px,y=py,ang=a;
    for(let i=0;i<segs;i++){ const u=i/segs; ang+=Math.sin(t*p.wave+i*0.6+p.pulseP)*0.4;
