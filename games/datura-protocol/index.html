      x+=Math.cos(ang)*L/segs; y+=Math.sin(ang)*L/segs; const rr2=pr*(0.5)*(1-u*0.7);
      sctx.globalAlpha=p.alpha; sctx.fillStyle=hsl((hue+u*40)%360,p.sat,p.light-u*10,1);
      sctx.beginPath(); sctx.arc(x,y,rr2,0,TAU); sctx.fill();
      sctx.globalCompositeOperation='lighter'; sctx.globalAlpha=0.4;
      sctx.fillStyle=hsl(hue,95,82,1); sctx.beginPath(); sctx.arc(x-rr2*0.25,y-rr2*0.25,rr2*0.4,0,TAU); sctx.fill();
      sctx.globalCompositeOperation='source-over';
    }
  }
  else if(p.kind==='lattice'){
    // a shimmering crystalline grid
    sctx.globalCompositeOperation='lighter'; sctx.globalAlpha=0.6*p.alpha;
    sctx.strokeStyle=hsl(hue,p.sat,p.light+6,1); sctx.lineWidth=Math.max(1,pr*0.03);
    const g=p.grid, S=pr*1.4; sctx.save(); sctx.translate(px,py); sctx.rotate(prot);
    for(let i=0;i<=g;i++){ const u=(i/g-0.5)*2*S, j=(Math.sin(t+i+p.pulseP))*p.jit*pr;
      sctx.beginPath(); sctx.moveTo(u+j,-S); sctx.lineTo(u-j,S); sctx.stroke();
      sctx.beginPath(); sctx.moveTo(-S,u+j); sctx.lineTo(S,u-j); sctx.stroke(); }
    sctx.restore();
  }
  else if(p.kind==='flower'){
    // layered rounded petals with a bright pistil
    for(let L=p.layers-1;L>=0;L--){ const n=p.petals+L*2, rr2=pr*(1-L*0.28), rot=prot+L*0.4+t*0.2;
      sctx.globalCompositeOperation= L? 'lighter':'source-over'; sctx.globalAlpha=(L?0.5:1)*p.alpha;
      sctx.fillStyle=hsl(L?p.hue2:hue, p.sat, p.light-L*6, 1);
      for(let k=0;k<n;k++){ const ang=rot+k/n*TAU;
        sctx.beginPath(); sctx.ellipse(px+Math.cos(ang)*rr2*0.5, py+Math.sin(ang)*rr2*0.5, rr2*0.5, rr2*0.24, ang, 0, TAU); sctx.fill(); } }
    sctx.globalCompositeOperation='lighter'; sctx.globalAlpha=0.9;
    sctx.fillStyle=hsl((hue+40)%360,95,78,1); sctx.beginPath(); sctx.arc(px,py,pr*0.24,0,TAU); sctx.fill();
  }
  else if(p.kind==='orbcluster'){
    // a cluster of luminous bubbles
    for(let i=0;i<p.orbs;i++){ const ang=i*2.399+prot, rad=pr*p.spread*Math.sqrt((i+0.5)/p.orbs);
      const ox=px+Math.cos(ang)*rad, oy=py+Math.sin(ang)*rad, orr=pr*0.34*(1-rad/(pr*p.spread)*0.4);
      sctx.globalCompositeOperation='lighter'; sctx.globalAlpha=0.35*p.alpha;
      sctx.fillStyle=hsl((hue+i*12)%360,90,60,1); sctx.beginPath(); sctx.arc(ox,oy,orr*1.4,0,TAU); sctx.fill();
      sctx.globalCompositeOperation='source-over'; sctx.globalAlpha=0.85*p.alpha;
      sctx.fillStyle=hsl((hue+i*12)%360,80,64,1); sctx.beginPath(); sctx.arc(ox,oy,orr,0,TAU); sctx.fill();
      sctx.globalCompositeOperation='lighter'; sctx.globalAlpha=0.8;
      sctx.fillStyle='#fff'; sctx.beginPath(); sctx.arc(ox-orr*0.3,oy-orr*0.3,orr*0.28,0,TAU); sctx.fill();
    }
  }
}

function drawBody(body, wx, wy){
  const sx=(wx-0)*G.scale + G.W/2;
  const sy=(wy-0)*G.scale + G.H/2;
  const R=body.radius*G.scale;
  if(R<0.5) return;
  // core glow
  sctx.globalCompositeOperation='lighter';
  // bloom that reads in the periphery — scaled down for huge bodies so late-cycle
  // giants don't flood the feedback loop to white
  const ba=clamp(120/R,0.3,1);
  const grd=sctx.createRadialGradient(sx,sy,0,sx,sy,R*1.6);
  grd.addColorStop(0,hsl(body.hue,92,60,0.42*ba));
  grd.addColorStop(0.5,hsl(body.hue,90,52,0.12*ba));
  grd.addColorStop(1,hsl(body.hue,90,50,0));
  sctx.globalAlpha=1; sctx.fillStyle=grd;
  sctx.beginPath(); sctx.arc(sx,sy,R*1.6,0,TAU); sctx.fill();
  if(body.danger){
    // predator: a slow-pulsing blood ring — dark against the glow, unmistakable in the periphery
    sctx.globalCompositeOperation='source-over';
    sctx.globalAlpha=0.55+0.3*Math.sin(G.t*3);
    sctx.strokeStyle='rgba(150,8,26,0.9)'; sctx.lineWidth=Math.max(1.5,R*0.09);
    sctx.beginPath(); sctx.arc(sx,sy,R*(1.12+0.06*Math.sin(G.t*3)),0,TAU); sctx.stroke();
    sctx.globalCompositeOperation='lighter';
  }
  // parts (outer last)
  const rot=body.spin;
  const list=body.parts;
  for(let i=0;i<list.length;i++) drawPart(body,list[i],sx,sy,R,rot);
  sctx.globalCompositeOperation='source-over'; sctx.globalAlpha=1;
}

/* =====================================================================
   THE MANDALA — the living centre you stare into. It IS the interface:
   petal rings = evolution stage, complexity = cycle, the arc = progress
   to the next metamorphosis, and when it blooms white-gold you hold
   SHIFT to transcend. It breathes, rotates against itself, and never
   stops changing.
   ===================================================================== */
function drawMandala(){
  const w=G.W,h=G.H,cx=w/2,cy=h/2, t=G.t;
  const tcm=smooth(G.transCharge);
  // breathes at 0.1 Hz — six breaths a minute; stare long enough and you breathe with it.
  // Meditation (stillness) deepens the breath.
  const breathe=1+(0.07+0.08*G.med)*Math.sin(t*0.628)+0.02*Math.sin(t*2.3);
  const R=Math.min(w,h)*(0.075+G.stage*0.006)*breathe*(1-tcm*0.35);
  const hue=(player.hue + t*8)%360;
  sctx.save();
  sctx.globalCompositeOperation='lighter';
  const rings=2+G.stage;
  for(let L=0;L<rings;L++){
    const dir=L%2?1:-1;
    const rot=t*(0.12+L*0.05+tcm*1.4)*dir + L*0.5;
    const rad=R*(0.34+L*(0.62/rings));
    const n=5+G.stage*2+((G.cycle-1)%4)+L;
    const lh=(hue+L*26+G.cycle*30)%360;
    sctx.globalAlpha=0.4-L*0.03;
    sctx.fillStyle=G.transReady? `hsla(${(45+L*8)|0},95%,${78-L*4}%,1)` : hsl(lh,85,64,1);
    for(let k=0;k<n;k++){
      const a=rot+k/n*TAU;
      sctx.beginPath();
      sctx.ellipse(cx+Math.cos(a)*rad, cy+Math.sin(a)*rad, R*0.16, R*0.07, a, 0, TAU);
      sctx.fill();
    }
  }
  // core: a breathing white-hot eye with a dark pupil that slowly dilates
  sctx.globalAlpha=0.85;
  const cg=sctx.createRadialGradient(cx,cy,0,cx,cy,R*0.3);
  cg.addColorStop(0,'rgba(255,255,255,0.95)');
  cg.addColorStop(0.4,hsl((hue+180)%360,80,60,0.7));
  cg.addColorStop(1,hsl(hue,80,40,0));
  sctx.fillStyle=cg; sctx.beginPath(); sctx.arc(cx,cy,R*0.3,0,TAU); sctx.fill();
  sctx.globalCompositeOperation='source-over';
  sctx.globalAlpha=0.9; sctx.fillStyle='rgba(5,2,8,0.9)';
  // the pupil dilates with eye-expansion events and the depth of the trip
  sctx.beginPath(); sctx.arc(cx,cy,R*0.085*(1+0.3*Math.sin(t*1.3))*(1+G.eyeDilate*1.9+G.trip*0.14),0,TAU); sctx.fill();
  // pareidolia: for a breath, the mandala ALMOST arranges into a face — two shadows where
  // eyes would be, a fainter one where a mouth would be. Below the threshold of certainty;
  // gone before it can be looked at. The face is assembled in the player, not on the screen.
  if(G.parei>0){
    const env=Math.sin(Math.PI*G.parei), pa=env*0.075;
    const s1=Math.sin(G.pareiSeed*7)*0.06, tilt=Math.sin(G.pareiSeed*13)*0.2;
    sctx.save(); sctx.translate(cx,cy); sctx.rotate(tilt);
    sctx.fillStyle=`rgba(4,1,8,${pa})`;
    sctx.beginPath(); sctx.ellipse(-R*0.3, -R*0.16+s1*R, R*0.16, R*0.11, -0.2, 0, TAU); sctx.fill();
    sctx.beginPath(); sctx.ellipse( R*0.3, -R*0.16-s1*R, R*0.16, R*0.11,  0.2, 0, TAU); sctx.fill();
    sctx.fillStyle=`rgba(4,1,8,${pa*0.7})`;
    sctx.beginPath(); sctx.ellipse(0, R*0.42, R*0.2, R*0.07, s1, 0, TAU); sctx.fill();
    sctx.restore();
  }
  // progress arc -> next metamorphosis; a full pulsing halo when transcendence is ready
  sctx.globalCompositeOperation='lighter';
  sctx.lineCap='round';
  if(G.transReady){
    sctx.globalAlpha=0.55+0.35*Math.sin(t*4);
    sctx.strokeStyle='hsla(48,100%,80%,1)'; sctx.lineWidth=Math.max(1.5,R*0.05);
    sctx.beginPath(); sctx.arc(cx,cy,R*1.1+Math.sin(t*4)*R*0.04,0,TAU); sctx.stroke();
  } else {
    sctx.globalAlpha=0.75;
    sctx.strokeStyle=hsl((hue+60)%360,90,75,1); sctx.lineWidth=Math.max(1.2,R*0.035);
    sctx.beginPath(); sctx.arc(cx,cy,R*1.1,-Math.PI/2,-Math.PI/2+TAU*G.evoProg); sctx.stroke();
  }
  sctx.restore(); sctx.globalAlpha=1; sctx.globalCompositeOperation='source-over';
}

function render(){
  const w=G.W,h=G.H;
  // background: a TRUE-BLACK void. Any non-black here is pumped forever through the
  // screen-blend feedback loop, so the empty field must read as pure dark for the
  // beings (and their trails) to glow as light against infinite depth.
  sctx.globalCompositeOperation='source-over'; sctx.globalAlpha=1;
  sctx.fillStyle='#000'; sctx.fillRect(0,0,w,h);
  const bh=(G.hue*57.3)%360;
  // a couple of very dim, localized fog patches for colour — kept low so they never flood
  sctx.globalCompositeOperation='lighter';
  for(let i=0;i<2;i++){
    const t=G.t*0.045+i*3.3;
    const x=w/2+Math.cos(t)*w*0.32, y=h/2+Math.sin(t*1.27)*h*0.32;
    const g=sctx.createRadialGradient(x,y,0,x,y,w*0.32);
    g.addColorStop(0,hsl(bh+i*120,80,20,0.05)); g.addColorStop(1,hsl(bh,70,12,0));
    sctx.fillStyle=g; sctx.fillRect(0,0,w,h);
  }
  // massive near-invisible faces bleed out of the background here, BEHIND everything else
  drawBigFaces();
  // vast irises dilating out of the fixation point
  drawEyeWaves();
  const opened = G.phase!=='fixate';
  // motes (faint while you're fixating; they swell in once the trip opens)
  const moteA = 0.25+0.75*G.open;
  for(const p of parts){
    if(p.kind!=='mote') continue;
    const sx=p.x*G.scale+w/2, sy=p.y*G.scale+h/2;
    if(sx<0||sx>w||sy<0||sy>h) continue;
    const tw=0.4+0.6*Math.abs(Math.sin(p.ph*2));
    sctx.globalAlpha=0.5*tw*moteA; sctx.fillStyle=hsl(p.hue+bh,80,70,1);
    sctx.beginPath(); sctx.arc(sx,sy,p.r*tw,0,TAU); sctx.fill();
  }
  // chromesthesia: the music, painted — each note a soft bloom on the pitch-circle
  for(let i=noteQ.length-1;i>=0;i--){
    const nb=noteQ[i]; const u=(G.t-nb.t0)/nb.dur;
    if(u>=1){ noteQ.splice(i,1); continue; }
    const env=Math.pow(Math.sin(Math.PI*Math.min(1,u)),1.5);
    const mn=Math.min(w,h)/2, ang=nb.pc/12*TAU+nb.jit;
    const nx=w/2+Math.cos(ang)*nb.rad*mn, ny=h/2+Math.sin(ang)*nb.rad*mn;
    const NR=mn*(0.1+nb.vol*0.55)*(0.75+u*0.5);
    const hue=(nb.pc*30+bh*0.3)%360;
    const ng=sctx.createRadialGradient(nx,ny,0,nx,ny,NR);
    ng.addColorStop(0,hsl(hue,88,64,0.24*env)); ng.addColorStop(0.6,hsl(hue,85,55,0.08*env)); ng.addColorStop(1,hsl(hue,80,50,0));
    sctx.globalCompositeOperation='lighter'; sctx.globalAlpha=1;
    sctx.fillStyle=ng; sctx.beginPath(); sctx.arc(nx,ny,NR,0,TAU); sctx.fill();
  }
  sctx.globalCompositeOperation='source-over';
  // reality gates — the two futures, read peripherally
  drawGates();
  // creatures — predators (bigger than you) carry a dark pulsing warning ring you can read peripherally
  for(const b of beings) drawBody({parts:b.parts,radius:b.radius,hue:b.genome.hue,spin:b.spin,hueShift:0,watch:false,
    danger:b.mass>player.mass*1.15}, b.x,b.y);
  // peripheral face flashes + afterimage burns — into the scene so the pipeline ghosts them
  drawFaces();
  drawBurn();
  // sparks
  sctx.globalCompositeOperation='lighter';
  for(const p of parts){
    if(p.kind!=='spark') continue;
    const sx=p.x*G.scale+w/2, sy=p.y*G.scale+h/2;
    const R=Math.max(0.6,p.r*G.scale);
    sctx.globalAlpha=clamp(p.life,0,1); sctx.fillStyle=hsl(p.hue+bh,95,70,1);
    sctx.beginPath(); sctx.arc(sx,sy,R,0,TAU); sctx.fill();
  }
  // absorb shock-rings expanding from the centre
  for(const p of parts){
    if(p.kind!=='ring') continue;
    const R=Math.max(1,(p.r0 + (1-p.life)*player.radius*4.5)*G.scale);
    sctx.globalAlpha=clamp(p.life,0,1)*0.5; sctx.strokeStyle=hsl(p.hue+bh,90,74,1);
    sctx.lineWidth=Math.max(1,player.radius*0.05*G.scale*p.life);
    sctx.beginPath(); sctx.arc(w/2,h/2,R,0,TAU); sctx.stroke();
  }
  if(opened){
    // the player, always centered, then the mandala breathing over your heart
    drawBody({parts:player.parts,radius:player.radius,hue:player.hue,spin:player.spin,hueShift:0,watch:true}, 0,0);
    drawMandala();
  } else {
    // fixation phase: nothing but a single luminous seed at dead centre to stare into
    sctx.globalCompositeOperation='lighter';
    const pr=8+3*Math.sin(G.t*2.2), g=sctx.createRadialGradient(w/2,h/2,0,w/2,h/2,pr*6);
    g.addColorStop(0,'rgba(255,255,255,0.9)'); g.addColorStop(0.4,'rgba(210,180,255,0.25)'); g.addColorStop(1,'rgba(210,180,255,0)');
    sctx.fillStyle=g; sctx.beginPath(); sctx.arc(w/2,h/2,pr*6,0,TAU); sctx.fill();
  }
  sctx.globalCompositeOperation='source-over'; sctx.globalAlpha=1;

  // hand to the GPU trip pipeline, then the crisp intrusion overlay on top
  Post.frame(scene, G);
  drawVeil();
}

/* =====================================================================
   AUDIO  (generative drone + absorb blips) — no assets
   ===================================================================== */
const audio=(()=>{
  let ac=null, master, drone=[], delay, wet, started=false;
  function ensure(){
    if(ac) return;
    try{ ac=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ return; }
    master=ac.createGain(); master.gain.value=0.0; master.connect(ac.destination);
    // feedback delay for space
    delay=ac.createDelay(1.5); delay.delayTime.value=0.42;
    const fb=ac.createGain(); fb.gain.value=0.38;
    wet=ac.createGain(); wet.gain.value=0.35;
    delay.connect(fb); fb.connect(delay); delay.connect(wet); wet.connect(master);
    // drone: detuned oscillators through a slow filter LFO
    const filt=ac.createBiquadFilter(); filt.type='lowpass'; filt.frequency.value=520; filt.Q.value=6;
    filt.connect(master); filt.connect(delay);
    // the filter swells at 0.1 Hz — six breaths a minute, in phase with the mandala
    const lfo=ac.createOscillator(); const lg=ac.createGain(); lfo.frequency.value=0.1; lg.gain.value=380;
    lfo.connect(lg); lg.connect(filt.frequency); lfo.start();
    [55,55.3,82.5,110,110.6].forEach((f,i)=>{
      const o=ac.createOscillator(); o.type=i%2?'sawtooth':'triangle'; o.frequency.value=f;
      const g=ac.createGain(); g.gain.value=0.14/(i+1); o.connect(g); g.connect(filt); o.start();
      drone.push({o,g});
    });
    // theta binaural bed: near-identical sine carriers hard-panned L/R — a 5.5 Hz beat
    // that exists only inside the listener's head
    try{
      const pl=ac.createStereoPanner(), pr2=ac.createStereoPanner(); pl.pan.value=-1; pr2.pan.value=1;
      const o1=ac.createOscillator(), o2=ac.createOscillator();
      o1.frequency.value=140; o2.frequency.value=145.5;
      const g1=ac.createGain(), g2=ac.createGain(); g1.gain.value=0.045; g2.gain.value=0.045;
      o1.connect(g1); g1.connect(pl); pl.connect(master);
      o2.connect(g2); g2.connect(pr2); pr2.connect(master);
      o1.start(); o2.start();
    }catch(e){}
  }
  function on(){ ensure(); if(!ac) return; if(ac.state==='suspended') ac.resume();
    started=true; master.gain.setTargetAtTime(G.sound?0.5:0.0, ac.currentTime, 1.2); }
  function setEnabled(v){ if(!ac) return; master.gain.setTargetAtTime(v?0.5:0.0, ac.currentTime, 0.3); }
  function blip(freq,dur,type,vol){ if(!ac||!started||!G.sound) return;
    // chromesthesia: every sounded note becomes light in the periphery — pitch class sets
    // its hue AND its position on the great circle, so the music paints a clock of colour
    if(noteQ.length<24) noteQ.push({t0:G.t, dur:Math.min(2.2,dur+0.6),
      pc:((12*Math.log2(freq/440))%12+12)%12, vol:vol||0.2, rad:rr(0.5,0.88), jit:gauss(0,0.12)});
    const o=ac.createOscillator(); o.type=type||'sine'; const g=ac.createGain();
    const m=ac.createOscillator(); const mg=ac.createGain(); // FM
    m.frequency.value=freq*rr(1.4,2.2); mg.gain.value=freq*rr(0.5,1.5);
    m.connect(mg); mg.connect(o.frequency); m.start();
    o.frequency.value=freq; g.gain.value=0; o.connect(g); g.connect(master); g.connect(delay);
    const n=ac.currentTime; g.gain.setValueAtTime(0,n);
    g.gain.linearRampToValueAtTime((vol||0.2),n+0.005);
    g.gain.exponentialRampToValueAtTime(0.0001,n+dur);
    o.frequency.exponentialRampToValueAtTime(freq*rr(1.3,2.0),n+dur);
    o.start(n); o.stop(n+dur+0.02); m.stop(n+dur+0.02);
  }
  /* ---- procedural biome music: every biome retunes the drone to its own chord/mode,
     shifts the delay space, and runs its own slow arpeggio of chime-notes; deep trip adds
     stuttering audio glitches and tape-warble in the delay line. The drone root never
     leaves — the One Note under everything. ---- */
  const MODES=[[0,0,7,12,12],[0,3,7,10,14],[0,5,7,12,17],[0,4,7,11,14],
               [0,2,7,9,14],[0,1,6,8,13],[0,7,12,19,24],[0,0,12,12,24]];
  let curMode=MODES[0], curRoot=45, arpT=2;
  const mf=(root,semi)=>440*Math.pow(2,(root+semi-69)/12);
  function setBiome(idx, clear){
    if(!ac) return;
    curMode = clear? MODES[7] : MODES[idx%MODES.length];
    curRoot = clear? 45 : 43+(idx*5)%10;
    drone.forEach((d,i)=>{
      const semi=curMode[i%curMode.length]-24+(i>2?12:0)+(i%2?0.06:0);   // slight beat-detune
      d.o.frequency.setTargetAtTime(mf(curRoot,semi), ac.currentTime, 2.8);
    });
    if(delay) delay.delayTime.setTargetAtTime(clear?0.62:0.24+((idx*97)%40)/120, ac.currentTime, 1.6);
  }
  function tick(dt, trip, idx){
    if(!ac||!started||!G.sound) return;
    arpT-=dt;
    if(arpT>0) return;
    arpT=rr(0.7,3)/(0.5+trip*0.8);
    // deep meditation: the arpeggio goes cold — sparse, high, minor-second detuned pairs,
    // like a town you shouldn't have walked into
    if(G.med>0.35 && srand()<0.4+G.med*0.3){
      const base=mf(curRoot,curMode[(srand()*curMode.length)|0]+36+pick([0,1,1,6]));
      blip(base, rr(1.4,2.8), 'sine', 0.03+G.med*0.045);
      blip(base*rr(1.004,1.012), rr(1.4,2.8), 'sine', 0.025+G.med*0.04);   // beating twin
      if(srand()<G.med*0.4) blip(base*0.5*Math.pow(2,1/12), rr(2,3.5), 'triangle', 0.03);
      return;
    }
    const semi=curMode[(srand()*curMode.length)|0]+12*ri(1,3);
    blip(mf(curRoot,semi), rr(0.5,1.8), pick(['sine','triangle']), 0.05+Math.min(0.06,trip*0.03));
    if(srand()<0.1+trip*0.09){          // glitch: stutter cluster + delay warble
      const f=mf(curRoot,semi+12);
      for(let i2=0,n2=ri(3,6);i2<n2;i2++) setTimeout(()=>blip(f*rr(0.94,1.06),0.05,'square',0.045), i2*42);
      if(delay){ const d0=delay.delayTime.value;
        delay.delayTime.setTargetAtTime(d0*rr(0.5,1.7), ac.currentTime, 0.06);
        delay.delayTime.setTargetAtTime(d0, ac.currentTime+0.5, 0.3); }
    }
  }
  function duck(sec){ if(!ac||!master) return;
    master.gain.setTargetAtTime(0.015, ac.currentTime, 0.08);
    master.gain.setTargetAtTime(G.sound?0.5:0, ac.currentTime+sec, 0.6); }
  return {
    on, setEnabled, setBiome, tick, duck,
    impact(m){ blip(30,1.3,'sine',0.28*m); blip(45,0.9,'sawtooth',0.22*m);
      blip(mf(curRoot,0)*2, 0.5, 'square', 0.08*m);
      if(delay){ const d0=delay.delayTime.value;
        delay.delayTime.setTargetAtTime(d0*1.8, ac.currentTime, 0.04);
        delay.delayTime.setTargetAtTime(d0, ac.currentTime+0.5, 0.3); } },
    absorb(p){ const base=200+ (1/(1+p))*500; blip(base*rr(0.9,1.1),0.35+p*0.4,'triangle',0.18+Math.min(0.2,p*0.2));
      if(p>0.6) blip(base*0.5,0.9,'sine',0.2); },
    surge(){ blip(70,2.2,'sawtooth',0.22); blip(105,1.8,'sine',0.16); },
    evolve(){ [0,4,7,12].forEach((s,i)=>blip(mf(curRoot,s+12),0.7+i*0.15,'triangle',0.16)); },
    drain(){ blip(48,0.6,'sawtooth',0.3); blip(36,0.9,'sine',0.22); },
    ready(){ [12,16,19].forEach(s=>blip(mf(curRoot,s+12),1.2,'sine',0.14)); },
    transcend(){ blip(66,2.6,'sawtooth',0.24);
      // resolution to unison — the One Note answered in octaves
      [0,12,24,36].forEach((s,i)=>blip(mf(curRoot,s),1.8+i*0.2,'sine',0.13)); },
  };
})();

/* no HUD, no counters, no words — only the void and what you are becoming */

/* =====================================================================
   INPUT
   ===================================================================== */
const keys=new Set();
// The pointer does NOTHING — you are locked to the centre. WASD moves the world; SHIFT is
// a controlled dash while moving, and transcendence while held still.
addEventListener('pointerdown',()=>{ audio.on(); },{passive:true});
addEventListener('keydown',e=>{ const k=e.key.toLowerCase(); keys.add(k);
  if(k==='shift'){ G.shiftHeld=true; }
  if(k==='m'){ G.sound=!G.sound; audio.setEnabled(G.sound); }
  if(k==='f'){ G.intensity=G.intensity>0.5?0.35:1; }
  if(['arrowup','arrowdown','arrowleft','arrowright',' '].includes(k)) e.preventDefault();
});
addEventListener('keyup',e=>{ const k=e.key.toLowerCase(); keys.delete(k);
  if(k==='shift') G.shiftHeld=false;
});
// never leave a key or SHIFT stuck if focus is lost mid-hold
addEventListener('blur',()=>{ keys.clear(); G.shiftHeld=false; });

/* =====================================================================
   BOOT / RESIZE / LOOP
   ===================================================================== */
function resize(){
  // FULL native resolution (up to 3x DPR) — auto-quality steps dprScale down only if the
  // machine can't hold framerate, so gaming PCs get every pixel.
  G.dpr=Math.min(window.devicePixelRatio||1, 3)*G.dprScale;
  G.W=Math.floor(innerWidth*G.dpr); G.H=Math.floor(innerHeight*G.dpr);
  scene.width=G.W; scene.height=G.H;
  Post.resize(G.W,G.H);
  veilEl.width=G.W; veilEl.height=G.H;
  veilEl.style.width=innerWidth+'px'; veilEl.style.height=innerHeight+'px';
  document.getElementById('gl').style.width=innerWidth+'px';
  document.getElementById('gl').style.height=innerHeight+'px';
}
addEventListener('resize',resize);

let last=0, fpsAcc=0, fpsN=0;
function loop(now){
  requestAnimationFrame(loop);
  if(!G.running) return;
  let dt=(now-last)/1000; last=now; if(!(dt>0)) dt=0.016; dt=Math.min(dt,0.05);
  G.dt=dt;
  // auto quality: shed effect density first, then resolution; climb back when headroom returns
  fpsAcc+=dt; fpsN++;
  if(fpsAcc>1){ const fps=fpsN/fpsAcc; fpsAcc=0; fpsN=0;
    if(fps<45){
      if(G.quality>0.4) G.quality-=0.1;
      else if(G.dprScale>0.5){ G.dprScale=Math.max(0.5,G.dprScale*0.85); resize(); }
    } else if(fps>57){
      if(G.dprScale<1){ G.dprScale=Math.min(1,G.dprScale*1.08); resize(); }
      else if(G.quality<1) G.quality+=0.05;
    } }
  update(dt); render();
}

function start(){
  if(G.started) return; G.started=true; G.running=true;
  _seed=(Date.now()>>>0)^0x5bd1e995;   // one-time entropy at start; RNG deterministic thereafter
  try{ const el=document.documentElement;
    (el.requestFullscreen||el.webkitRequestFullscreen||el.mozRequestFullScreen||function(){}).call(el); }catch(e){}
  initPlayer(); seedMotes();
  G.biome=makeBiome(0); G.realm=G.biome.idx;   // every run begins in a random biome
  buildSnakes();
  document.getElementById('intro').classList.add('gone');
  audio.on();
  audio.setBiome(G.biome.idx,false);           // the first biome's chord
  setTimeout(resize,80);   // re-measure once fullscreen has settled
  last=performance.now();
}

document.getElementById('intro').addEventListener('click',start);
addEventListener('keydown',e=>{ if(!G.started && (e.key===' '||e.key==='Enter')) start(); });
addEventListener('fullscreenchange',resize);
addEventListener('webkitfullscreenchange',resize);

resize();
requestAnimationFrame(loop);

// expose a few handles for debugging / external drivers
window.G=G; window.player=player; window.beings=beings; window.parts=parts; window.faces=faces;
window.shades=shades; window.crawlers=crawlers; window.bigFaces=bigFaces; window.eyeWaves=eyeWaves;
window.gates=gates; window.Post=Post; window.REALMS=REALMS;
</script>
